<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ratio Battle</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:-apple-system,"Helvetica Neue",Arial,sans-serif;}
  html,body{margin:0;height:100%;}
  body{background:#0c1020;display:flex;align-items:center;justify-content:center;overflow:hidden;color:#1d2b36;}
  #app{width:100%;max-width:1000px;min-height:560px;max-height:96vh;background:#eaf4ff;position:relative;display:flex;flex-direction:column;}
  .hide{display:none!important;}
  .statusbar{background:#3a2270;color:#fff;padding:7px 16px;display:flex;justify-content:space-between;align-items:center;font-weight:800;font-size:14px;flex:0 0 auto;}
  .statusbar .ttl{display:flex;align-items:center;gap:8px;}
  .homebtn{background:rgba(255,255,255,.18);border:none;color:#fff;font-weight:900;font-size:13px;border-radius:9px;padding:5px 11px;margin-right:8px;cursor:pointer;flex:0 0 auto;}
  .homebtn:active{transform:scale(.92);}
  .statusbar .pill{background:rgba(255,255,255,.16);border-radius:16px;padding:3px 12px;margin-left:6px;}
  .wrap{flex:1;display:flex;flex-direction:column;min-height:0;position:relative;}
  /* arena */
  .arena{flex:1;position:relative;background:linear-gradient(180deg,#bfe0ff,#eaf4ff 55%,#d6f0d0);overflow:hidden;min-height:0;}
  .foe{position:absolute;right:5%;top:6px;text-align:center;}
  .me{position:absolute;left:5%;bottom:8px;text-align:center;}
  .plat{position:absolute;width:200px;height:34px;border-radius:50%;background:rgba(120,170,90,.4);}
  .platE{right:3%;top:120px;} .platM{left:3%;bottom:6px;background:rgba(90,140,200,.35);}
  .nameTag{display:inline-flex;align-items:center;gap:6px;background:#fff;border:2px solid #cfd8e3;border-radius:10px;padding:3px 11px;font-weight:900;font-size:13px;color:#22303a;box-shadow:0 3px 8px rgba(0,0,0,.12);}
  .lv{font-size:10px;color:#6b7884;font-weight:800;}
  .type{font-size:9px;font-weight:900;color:#fff;border-radius:9px;padding:1px 7px;}
  .hpwrap{display:flex;align-items:center;gap:5px;margin-top:3px;justify-content:center;}
  .hpl{font-size:10px;font-weight:900;color:#caa23a;}
  .hpbar{width:150px;height:11px;background:#e6e1cf;border:1.5px solid #b6ab83;border-radius:6px;overflow:hidden;}
  .hpbar i{display:block;height:100%;transition:width .4s;}
  .hpnum{font-size:10px;font-weight:900;color:#5f6b76;margin-top:1px;}
  .xpwrap{display:flex;align-items:center;gap:5px;margin-top:2px;justify-content:center;}
  .xpl{font-size:9px;font-weight:900;color:#6a4fb0;}
  .xpbar{width:150px;height:7px;background:#e3dcf0;border:1.5px solid #b9a9e0;border-radius:5px;overflow:hidden;}
  .xpbar i{display:block;height:100%;background:linear-gradient(90deg,#8a5cd0,#b07bff);transition:width .4s;}
  .mon{transition:transform .12s;}
  .mon.hit{animation:shake .4s;}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
  .dmg{position:absolute;font-size:30px;font-weight:900;color:#e0224a;text-shadow:0 2px 0 #fff;z-index:6;pointer-events:none;animation:dfloat 1s ease forwards;}
  .dmg.heal{color:#1f9a4c;}
  @keyframes dfloat{0%{opacity:0;transform:translateY(0) scale(.6);}20%{opacity:1;transform:translateY(-10px) scale(1.1);}100%{opacity:0;transform:translateY(-46px) scale(1);}}
  /* bottom panel */
  .panel{flex:0 0 auto;background:#10142b;border-top:4px solid #4a5a8a;padding:9px 12px;min-height:150px;display:flex;gap:10px;}
  .msg{flex:1;background:#0a0e1f;border:2px solid #2c3a66;border-radius:12px;padding:10px 14px;color:#fff;font-weight:800;font-size:14px;display:flex;align-items:center;}
  .msg b{color:#ffd24a;}
  .moves{flex:1.3;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .mv{border:none;border-radius:11px;padding:8px 10px;color:#fff;font-weight:900;font-size:13px;text-align:left;box-shadow:0 4px 0 rgba(0,0,0,.3);cursor:pointer;}
  .mv:active{transform:translateY(4px);box-shadow:0 0 0 rgba(0,0,0,.3);}
  .mv small{display:block;font-size:9.5px;font-weight:700;opacity:.95;margin-top:1px;}
  .mv[disabled]{opacity:.4;}
  .m1{background:#2f7eb5;}.m2{background:#8a5cd0;}.m3{background:#e0556a;}.m4{background:#5a8f2e;}
  /* puzzle panel (replaces moves) */
  .puz{flex:1.3;background:#0a0e1f;border:2px solid #4a5a8a;border-radius:12px;padding:8px 10px;display:flex;flex-direction:column;gap:6px;}
  .puz .ph{display:flex;align-items:center;justify-content:space-between;color:#fff;font-weight:900;font-size:12px;}
  .puz .ph .rt{color:#ffd24a;}
  .ratio{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;background:#fff;border-radius:11px;padding:8px;}
  .chip{display:inline-flex;align-items:center;justify-content:center;min-width:44px;height:48px;padding:0 8px;border-radius:11px;color:#fff;font-size:23px;font-weight:900;box-shadow:0 3px 0 rgba(0,0,0,.2);}
  .colon{font-size:22px;font-weight:900;color:#9b8ac4;}
  .facs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
  .fac{background:#ede6fb;color:#3a2270;border:2px solid #cdbcef;border-radius:9px;font-size:15px;font-weight:900;padding:7px 11px;cursor:pointer;box-shadow:0 3px 0 #cdbcef;}
  .fac:active{transform:translateY(3px);box-shadow:0 0 0 #cdbcef;}
  .fac.reset{color:#c0392b;border-color:#f0b9b9;box-shadow:0 3px 0 #f0b9b9;}
  .lcard{display:flex;align-items:center;gap:8px;background:#fff;border-radius:10px;padding:5px 9px;}
  .lhdr{flex:0 0 92px;font-size:11px;font-weight:900;color:#3a2270;}
  .lb{background:#ede6fb;color:#3a2270;border:2px solid #cdbcef;border-radius:8px;font-size:13px;font-weight:900;padding:5px 8px;cursor:pointer;box-shadow:0 3px 0 #cdbcef;}
  .lb.reset{color:#c0392b;border-color:#f0b9b9;box-shadow:0 3px 0 #f0b9b9;}
  .lbtns{margin-left:auto;display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;}
  .chip.sh{box-shadow:0 3px 0 rgba(0,0,0,.2),0 0 0 3px #ffd24a;}
  .chip.gsh{animation:gshpulse .85s infinite;}
  @keyframes gshpulse{0%,100%{box-shadow:0 3px 0 rgba(0,0,0,.2),0 0 0 3px #ffd24a,0 0 6px #ffd24a;}50%{box-shadow:0 3px 0 rgba(0,0,0,.2),0 0 0 6px #ffd24a,0 0 18px #ffd24a;}}
  .lcmq{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center;color:#fff;font-size:14px;font-weight:900;}
  .lcmopt{font-size:15px;}
  .okmark{color:#1f9a4c;font-size:20px;font-weight:900;}
  .quizq sup,.qopt sup{font-size:.65em;}
  .qf{display:inline-flex;flex-direction:column;vertical-align:middle;text-align:center;line-height:1.02;margin:0 2px;}
  .qf .qn{border-bottom:2px solid currentColor;padding:0 4px;font-size:.78em;}
  .qf .qd{padding:0 4px;font-size:.78em;}
  .prow{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-top:auto;}
  .back{background:#2c3a66;color:#fff;border:none;border-radius:9px;padding:8px 12px;font-weight:900;font-size:12px;cursor:pointer;}
  .atk{background:#e0556a;color:#fff;border:none;border-radius:10px;padding:9px 22px;font-weight:900;font-size:15px;box-shadow:0 4px 0 #a3132b;cursor:pointer;}
  .atk:active{transform:translateY(4px);box-shadow:0 0 0 #a3132b;}
  .hint{font-size:10.5px;font-weight:800;color:#9fb0d6;text-align:center;}
  .proj{position:absolute;z-index:20;min-width:26px;height:30px;padding:0 5px;border-radius:7px;color:#fff;font-weight:900;font-size:16px;display:flex;align-items:center;justify-content:center;transform:translate(0,0) scale(1);transition:transform .5s cubic-bezier(.5,.05,.4,1);box-shadow:0 3px 0 rgba(0,0,0,.25);pointer-events:none;}
  .shield{display:inline-block;background:#2c3a66;color:#ffd24a;border-radius:9px;padding:2px 9px;font-size:10px;font-weight:900;margin-top:3px;}
  .quizq{background:#fff;border-radius:10px;padding:9px 12px;font-size:16px;font-weight:900;color:#2e1b5e;text-align:center;}
  .qopts{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
  .qopt{background:#ede6fb;color:#3a2270;border:2px solid #cdbcef;border-radius:9px;font-size:15px;font-weight:900;padding:9px 0;cursor:pointer;box-shadow:0 3px 0 #cdbcef;}
  .qopt:active{transform:translateY(3px);box-shadow:0 0 0 #cdbcef;}
  .namebox{text-align:center;font-size:14px;font-weight:800;color:#3a2270;margin:8px 0 2px;}
  .namebox input{font-size:16px;font-weight:900;color:#2e1b5e;border:2px solid #cdbcef;border-radius:9px;padding:6px 10px;width:160px;text-align:center;text-transform:uppercase;}
  /* animation fx */
  .fx{position:absolute;z-index:22;pointer-events:none;font-weight:900;color:#fff;display:flex;align-items:center;justify-content:center;}
  .fx.ball{min-width:28px;height:28px;border-radius:50%;font-size:15px;box-shadow:0 0 9px rgba(0,0,0,.35);}
  .fx.bomb{min-width:30px;height:30px;border-radius:9px;font-size:15px;box-shadow:0 3px 0 rgba(0,0,0,.3);}
  .fx.orb{width:22px;height:22px;border-radius:50%;box-shadow:0 0 12px currentColor;}
  .fx.spike{width:0;height:0;background:transparent!important;border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:17px solid #2e9e5b;filter:drop-shadow(0 0 3px #2e9e5b);}
  .fx.fire{width:26px;height:26px;border-radius:50% 50% 50% 0;background:radial-gradient(circle at 60% 40%,#ffe14a,#ff7a1f);transform:rotate(45deg);box-shadow:0 0 14px #ff7a1f;}
  .fx.rock{width:34px;height:30px;border-radius:9px;background:#8a6a3a;box-shadow:inset -5px -5px 0 rgba(0,0,0,.22);font-size:16px;}
  .fx.spark{width:10px;height:10px;border-radius:50%;transition:transform .42s ease-out,opacity .42s;}
  .fx.beam{height:11px;border-radius:6px;transition:width .25s ease-out,opacity .2s;box-shadow:0 0 14px currentColor;}
  .fx.lvring{width:60px;height:60px;border-radius:50%;background:transparent!important;border:5px solid #ffd24a;box-shadow:0 0 20px #ffd24a;transition:transform .5s ease-out,opacity .5s;}
  .fx.flash{position:absolute;inset:0;background:rgba(255,250,200,.55);transition:opacity .4s;z-index:24;}
  .bigtimer{position:absolute;top:6px;left:50%;transform:translateX(-50%);z-index:8;width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.92);border:3px solid #3a2270;color:#3a2270;font-size:23px;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 10px rgba(0,0,0,.2);}
  .bigtimer.danger{border-color:#e0556a;color:#e0556a;animation:tpulse .5s infinite;}
  @keyframes tpulse{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.13)}}
  .quaking{animation:quakeA .42s;}
  @keyframes quakeA{0%,100%{transform:translate(0,0)}20%{transform:translate(-5px,2px)}40%{transform:translate(5px,-2px)}60%{transform:translate(-4px,1px)}80%{transform:translate(4px,-1px)}}
  .toast{position:absolute;top:14%;left:50%;background:#c0392b;color:#fff;font-weight:900;font-size:14px;padding:10px 18px;border-radius:12px;z-index:30;pointer-events:none;animation:tp 1.3s ease forwards;}
  @keyframes tp{0%{opacity:0;transform:translateX(-50%) scale(.7);}14%{opacity:1;transform:translateX(-50%) scale(1.04);}80%{opacity:1;}100%{opacity:0;}}
  .toast.good{background:#1f9a4c;}
  /* overlay */
  .ov{position:absolute;inset:0;background:rgba(12,16,32,.96);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;z-index:40;overflow:auto;}
  .ov h1{font-size:27px;margin:6px 0;}.ov p{font-size:14px;max-width:680px;line-height:1.5;opacity:.95;}
  .ov .big{font-size:50px;}
  .startcard{background:#fff;border-radius:22px;padding:18px 24px;max-width:640px;color:#22303a;box-shadow:0 18px 50px rgba(0,0,0,.5);}
  .startcard .ttl{font-size:23px;font-weight:900;color:#3a2270;text-align:center;}
  .mvlist{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0 4px;}
  .mvc{border-radius:11px;padding:8px 12px;color:#fff;font-weight:900;font-size:13px;text-align:left;}
  .mvc small{display:block;font-size:10px;font-weight:700;opacity:.95;}
  .ov button{margin-top:14px;background:#e0556a;color:#fff;border:none;border-radius:14px;padding:13px 38px;font-size:18px;font-weight:900;}
  .roles{font-size:13px;font-weight:800;color:#5f6b76;margin-top:8px;}
</style>
</head>
<body>
<div id="app">
  <div class="statusbar">
    <div class="ttl"><button class="homebtn" onclick="goHome()">&#8962; Home</button>&#9876;&#65039; Ratio Battle</div>
    <div><span class="pill">Foe <b id="foenum">1</b> / 7</span></div>
  </div>
  <div class="wrap" id="game"></div>
  <div class="ov" id="overlay"></div>
</div>
<script>
"use strict";
function $(id){return document.getElementById(id);}
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[rnd(0,a.length-1)];}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=rnd(0,i),t=a[i];a[i]=a[j];a[j]=t;}return a;}
function gcd(a,b){return b===0?a:gcd(b,a%b);}
function gcdArr(a){return a.reduce(function(x,y){return gcd(x,y);});}
function lcm(a,b){return a*b/gcd(a,b);}
function sum(a){return a.reduce(function(x,y){return x+y;},0);}

/* sound */
var actx=null;
function eA(){try{if(!actx)actx=new (window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();}catch(e){}}
function hitSnd(){eA();if(!actx)return;try{var t=actx.currentTime;[523,659,784,1047].forEach(function(f,i){var o=actx.createOscillator(),g=actx.createGain();o.type='triangle';o.frequency.value=f;o.connect(g);g.connect(actx.destination);var s=t+i*0.06;g.gain.setValueAtTime(0.0001,s);g.gain.exponentialRampToValueAtTime(0.25,s+0.02);g.gain.exponentialRampToValueAtTime(0.0001,s+0.18);o.start(s);o.stop(s+0.2);});}catch(e){}}
function missSnd(){eA();if(!actx)return;try{var t=actx.currentTime;var o=actx.createOscillator(),g=actx.createGain();o.type='sawtooth';o.frequency.setValueAtTime(240,t);o.frequency.exponentialRampToValueAtTime(90,t+0.4);o.connect(g);g.connect(actx.destination);g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.22,t+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t+0.45);o.start(t);o.stop(t+0.5);}catch(e){}}
function blip(){eA();if(!actx)return;try{var t=actx.currentTime;var o=actx.createOscillator(),g=actx.createGain();o.type='square';o.frequency.setValueAtTime(700,t);o.frequency.exponentialRampToValueAtTime(420,t+0.1);o.connect(g);g.connect(actx.destination);g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.14,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+0.13);o.start(t);o.stop(t+0.14);}catch(e){}}
function toast(m){var t=$('toast');if(t)t.remove();var d=document.createElement('div');d.className='toast';d.id='toast';d.innerHTML=m;$('app').appendChild(d);setTimeout(function(){if(d.parentNode)d.remove();},1300);}

/* ---- cartoon monster sprites ---- */
var EY='<circle cx="40" cy="50" r="7" fill="#fff"/><circle cx="60" cy="50" r="7" fill="#fff"/><circle cx="41" cy="51" r="3.3" fill="#22303a"/><circle cx="61" cy="51" r="3.3" fill="#22303a"/>';
function bodyBlob(c,d){return '<path d="M22 64 q-6 -44 28 -44 q34 0 28 44 q-4 18 -28 18 q-24 0 -28 -18 Z" fill="'+c+'" stroke="'+d+'" stroke-width="3"/>';}
function mHero(c,d){return bodyBlob(c,d)+EY+'<path d="M43 64 q7 6 14 0" fill="none" stroke="'+d+'" stroke-width="3" stroke-linecap="round"/><path d="M50 18 q9 -11 17 -6 q-2 11 -15 11 Z" fill="#2e9e5b" stroke="#1f6e43" stroke-width="2"/><circle cx="32" cy="60" r="4" fill="#ff9aa0" opacity=".6"/><circle cx="68" cy="60" r="4" fill="#ff9aa0" opacity=".6"/>';}
function mSlime(c,d){return bodyBlob(c,d)+EY+'<path d="M43 63 q7 7 14 0" fill="none" stroke="'+d+'" stroke-width="3" stroke-linecap="round"/><path d="M30 30 q20 -8 40 0" fill="none" stroke="#fff" stroke-width="3" opacity=".5"/>';}
function mImp(c,d){return '<path d="M28 28 l-7 -16 l16 9 Z" fill="'+d+'"/><path d="M72 28 l7 -16 l-16 9 Z" fill="'+d+'"/>'+bodyBlob(c,d)+EY+'<path d="M32 44 l12 5 M68 44 l-12 5" stroke="'+d+'" stroke-width="3" stroke-linecap="round"/><path d="M44 64 l4 8 l4 -8 Z" fill="#fff"/><path d="M52 64 l4 8 l4 -8 Z" fill="#fff"/>';}
function mSpike(c,d){var sp='';for(var a=0;a<360;a+=45){sp+='<path d="M50 14 l7 14 h-14 Z" fill="'+d+'" transform="rotate('+a+' 50 52)"/>';}return sp+'<circle cx="50" cy="52" r="25" fill="'+c+'" stroke="'+d+'" stroke-width="3"/><circle cx="42" cy="50" r="6" fill="#fff"/><circle cx="58" cy="50" r="6" fill="#fff"/><circle cx="43" cy="51" r="3" fill="#22303a"/><circle cx="59" cy="51" r="3" fill="#22303a"/><path d="M44 62 q6 4 12 0" fill="none" stroke="'+d+'" stroke-width="2.5"/>';}
function mCyclops(c,d){return '<path d="M50 18 v-9" stroke="'+d+'" stroke-width="3"/><circle cx="50" cy="7" r="3.5" fill="'+d+'"/>'+bodyBlob(c,d)+'<circle cx="50" cy="48" r="14" fill="#fff"/><circle cx="50" cy="50" r="6.5" fill="#22303a"/><path d="M40 66 q10 6 20 0" fill="none" stroke="'+d+'" stroke-width="3" stroke-linecap="round"/>';}
function mBat(c,d){return '<path d="M24 48 q-20 -8 -16 16 q12 -4 18 2 Z" fill="'+d+'"/><path d="M76 48 q20 -8 16 16 q-12 -4 -18 2 Z" fill="'+d+'"/><path d="M28 62 q-2 -38 22 -38 q24 0 22 38 q-3 16 -22 16 q-19 0 -22 -16 Z" fill="'+c+'" stroke="'+d+'" stroke-width="3"/><circle cx="42" cy="50" r="6" fill="#fff"/><circle cx="58" cy="50" r="6" fill="#fff"/><circle cx="43" cy="51" r="3" fill="#c0392b"/><circle cx="59" cy="51" r="3" fill="#c0392b"/><path d="M45 62 l3 7 l3 -7 Z" fill="#fff"/><path d="M51 62 l3 7 l3 -7 Z" fill="#fff"/>';}
function mGolem(c,d){return '<rect x="24" y="28" width="52" height="54" rx="12" fill="'+c+'" stroke="'+d+'" stroke-width="3"/><path d="M40 28 l5 20 l-7 10 M64 34 l-6 16" stroke="'+d+'" stroke-width="2" fill="none" opacity=".55"/><rect x="34" y="46" width="9" height="9" rx="2" fill="#fff"/><rect x="57" y="46" width="9" height="9" rx="2" fill="#fff"/><rect x="37" y="49" width="4" height="4" fill="#22303a"/><rect x="60" y="49" width="4" height="4" fill="#22303a"/><rect x="40" y="66" width="20" height="5" rx="2" fill="'+d+'"/>';}
function mDragon(c,d){return '<path d="M22 46 q-22 -10 -16 18 q14 -6 20 2 Z" fill="'+d+'"/><path d="M78 46 q22 -10 16 18 q-14 -6 -20 2 Z" fill="'+d+'"/><path d="M30 26 l-6 -16 l14 9 Z" fill="'+d+'"/><path d="M70 26 l6 -16 l-14 9 Z" fill="'+d+'"/>'+bodyBlob(c,d)+EY+'<path d="M32 44 l12 4 M68 44 l-12 4" stroke="'+d+'" stroke-width="3"/><path d="M43 64 l4 8 l4 -8 Z" fill="#fff"/><path d="M51 64 l4 8 l4 -8 Z" fill="#fff"/><path d="M36 16 l5 8 l9 -10 l9 10 l5 -8 v8 h-33 Z" fill="#ffd24a" stroke="#caa12a" stroke-width="2"/>';}
function monSVG(fn,c,d,s){s=s||112;return '<svg class="mon" width="'+s+'" height="'+s+'" viewBox="0 0 100 100"><ellipse cx="50" cy="90" rx="26" ry="6" fill="rgba(0,0,0,.13)"/>'+fn(c,d)+'</svg>';}

var ENEMIES=[
 {n:"BLOOP",t:"WATER",tc:"#2f7eb5",c:"#5ab0e0",d:"#2f7eb5",hp:42,atk:8,draw:mSlime},
 {n:"IMPY",t:"FIRE",tc:"#e0561f",c:"#ff8a5a",d:"#d8521f",hp:60,atk:10,draw:mImp},

function hpbar(hp,max,col){var p=Math.max(0,hp/max*100);var c=p<=25?'#e0556a':p<=50?'#f0a93c':col;return '<div class="hpwrap"><span class="hpl">HP</span><div class="hpbar"><i style="width:'+p+'%;background:'+c+'"></i></div></div><div class="hpnum">'+hp+' / '+max+'</div>';}
function moveBtn(k,cls){
 var lvlok=(k==="simp2"||k==="guard")||(k==="simp3"&&S.lv>=2)||(k==="fusion"&&S.lv>=3);
 var isReq=(S.foe.req===k);
 var shieldBlock=S.foe.req && k!==S.foe.req && k!=="guard";
 var ok=(lvlok||isReq)&&!shieldBlock;
 var sub={simp2:"化簡 a : b",simp3:"化簡 a : b : c (Lv.2)",fusion:"連比 a:b &amp; b:c (Lv.3)",guard:"答題回血 ¼"}[k];
 var tag=shieldBlock?" &#128737;":((!lvlok&&!isReq)?" &#128274;":"");
 return '<button class="mv '+cls+'"'+(ok?'':' disabled')+' onclick="chooseMove(\''+k+'\')">'+MV[k].name+tag+'<small>'+sub+'</small></button>';}
function render(){
 var f=S.foe;
 var shieldBadge=f.req?'<div class="shield">&#128737; only <b>'+MV[f.req].name+'</b> breaks the shield!</div>':'';
 var foeHTML='<div class="foe"><div class="nameTag">'+f.n+' <span class="lv">Lv.'+(S.ei+5)+'</span> <span class="type" style="background:'+f.tc+'">'+f.t+'</span></div>'+hpbar(f.hp,f.max,f.d)+shieldBadge+'<div style="margin-top:2px">'+monSVG(f.draw,f.c,f.d,112)+'</div></div>';
 var xpbar='<div class="xpwrap"><span class="xpl">XP</span><div class="xpbar"><i style="width:'+Math.round(S.xp/S.xpNext*100)+'%"></i></div></div>';
 var meHTML='<div class="me">'+monSVG(mHero,'#7fd07f','#3f9e4f',112)+'<div class="nameTag" style="margin-top:1px">'+S.heroName+' <span class="lv">Lv.'+S.lv+'</span> <span class="type" style="background:#2e9e5b">HERO</span></div>'+hpbar(S.php,S.pmax,'#2e9e5b')+xpbar+'</div>';
 var bottom;
 if(S.ui==="choose"){
   bottom='<div class="msg" id="msg">'+S.msg+'</div><div class="moves">'+moveBtn("simp2","m1")+moveBtn("simp3","m2")+moveBtn("fusion","m3")+moveBtn("guard","m4")+'</div>';
 } else if(S.ui==="heal"){
   var opts=S.quizOpts.map(function(o){return '<button class="qopt" onclick="answerQuiz(\''+o+'\')">'+fmtMath(o)+'</button>';}).join('');
   bottom='<div class="puz"><div class="ph"><span>&#129504; Guard / Focus &mdash; answer to heal!</span><span class="rt" id="rt">0:'+(S.rt<10?"0":"")+S.rt+'</span></div>'+
     '<div class="quizq">'+fmtMath(S.quiz.q)+'</div><div class="qopts">'+opts+'</div>'+
     '<div class="prow"><button class="back" onclick="backMove()">&#8617; Move</button><span class="hint">Correct &rarr; recover &frac14; HP</span></div></div>';
 } else {
   var inner='';
   if(S.move==="simp2"||S.move==="simp3"){
     var facs='';[2,3,4,5,6,7,9].forEach(function(x){facs+='<button class="fac" onclick="divideBy('+x+')">&divide;'+x+'</button>';});
     inner='<div class="ratio">'+chips(S.terms,S.cols)+'</div><div class="facs">'+facs+'</div><div class="hint">Divide EVERY part to the simplest, then ATTACK!</div>';
   } else { // fusion (guided)
     var L=S.shareT, aligned=(S.c1[1]===L && S.c2[0]===L);
     function cardG(idx){var c=(idx===1)?S.c1:S.c2;var nL=(idx===1)?S.ln[0]:S.ln[1],nR=(idx===1)?S.ln[1]:S.ln[2];var cL=(idx===1)?S.lc[0]:S.lc[1],cR=(idx===1)?S.lc[1]:S.lc[2];var shR=(idx===1),shL=(idx===2);
       var bval=(idx===1)?c[1]:c[0], done=(bval===L);
       var ctrl='';
       if(S.fstep!=="lcm"){ ctrl=done?'<span class="okmark">&#10003;</span>':(S.fstep==="mult"?['2','3','4','5','6'].map(function(x){return '<button class="lb" onclick="multCardG('+idx+','+x+')">&times;'+x+'</button>';}).join(''):''); }
       return '<div class="lcard"><div class="lhdr">'+nL+' : '+nR+'</div><div style="display:flex;align-items:center;gap:5px">'+
         '<span class="chip'+(shL?' gsh':'')+'" style="background:'+cL+'">'+c[0]+'</span><span class="colon">:</span><span class="chip'+(shR?' gsh':'')+'" style="background:'+cR+'">'+c[1]+'</span></div><div class="lbtns">'+ctrl+'</div></div>';}
     var prompt;
     if(S.fstep==="lcm"){
       var opts=S.lcmOpts.map(function(n){return '<button class="lb lcmopt" onclick="answerLCM('+n+')">'+n+'</button>';}).join('');
       prompt='<div class="lcmq">&#128279; LCM of <b style="color:'+S.lc[1]+'">'+S.c1b[1]+'</b> &amp; <b style="color:'+S.lc[1]+'">'+S.c2b[0]+'</b> &nbsp;=&nbsp; '+opts+'</div>';
     } else if(S.fstep==="mult"){
       prompt='<div class="hint">&times;? &rarr; make each <b style="color:'+S.lc[1]+'">'+S.ln[1]+'</b> become <b style="color:#ffd24a">'+L+'</b></div>';
     } else { // combine: pick final a:b:c
       var copts=S.combineOpts.map(function(o){return '<button class="lb lcmopt" onclick="answerCombine(\''+o+'\')">'+o+'</button>';}).join('');
       prompt='<div class="lcmq">&#10024; '+S.ln[0]+' : '+S.ln[1]+' : '+S.ln[2]+' &nbsp;=&nbsp; '+copts+'</div>';
     }
     inner=cardG(1)+cardG(2)+prompt;
   }
   bottom='<div class="puz"><div class="ph"><span>'+MV[S.move].name+'</span><span class="rt" id="rt">0:'+(S.rt<10?"0":"")+S.rt+'</span></div>'+inner+
     '<div class="prow"><button class="back" onclick="backMove()">&#8617; Move</button>'+(S.move==="fusion"?'':'<button class="atk" onclick="attack()">&#9876; ATTACK!</button>')+'</div></div>';
 }
 $('game').innerHTML='<div class="arena"><div class="plat platE"></div><div class="plat platM"></div><div class="bigtimer'+(S.rt<=5?' danger':'')+'" id="bigtimer">'+Math.max(0,S.rt)+'</div>'+foeHTML+meHTML+'</div><div class="panel">'+bottom+'</div>';
 $('foenum').textContent=(S.ei+1);
}

/* overlays */
function showStart(){
 $('overlay').classList.remove('hide');
 $('overlay').innerHTML='<div class="startcard"><div class="ttl">&#9876;&#65039; Ratio Battle</div>'
  +'<p style="text-align:center">Team up (4 players) &amp; beat 7 monsters! Decide a move together &mdash; solve the ratio to fire number-blocks at the foe.</p>'
  +'<div class="mvlist">'
   +'<div class="mvc" style="background:#2f7eb5">Simplify Strike<small>化簡 a : b ‧ low dmg</small></div>'
   +'<div class="mvc" style="background:#8a5cd0">Triple Slash<small>化簡 a : b : c ‧ mid dmg</small></div>'
   +'<div class="mvc" style="background:#e0556a">Fusion Combo<small>連比 a:b &amp; b:c &rarr; a:b:c ‧ BIG</small></div>'
   +'<div class="mvc" style="background:#5a8f2e">Guard / Focus<small>答題啱 &rarr; 回 &frac14; HP</small></div>'
  +'</div>'
  +'<div class="namebox">Name your monster: <input id="heroIn" maxlength="12" placeholder="HERO" /></div>'
  +'<div class="roles">Stronger moves unlock as you win. Some foes have a &#128737; shield &mdash; only ONE move works! Spamming the weak move won&#39;t cut it.</div>'
  +'<button onclick="startGame()">Battle!</button></div>';
}
function goHome(){if(S.timer)clearInterval(S.timer);showStart();}
function win(){if(S.timer)clearInterval(S.timer);$('overlay').classList.remove('hide');$('overlay').innerHTML='<div class="big">&#127942;&#9876;&#65039;</div><h1>Champions!</h1><p>You beat all 6 monsters with smart ratios. LEEFO is proud!</p><button onclick="goHome()">Home</button>';}
function lose(){if(S.timer)clearInterval(S.timer);$('overlay').classList.remove('hide');$('overlay').innerHTML='<div class="big">&#128132;</div><h1>LEEFO fainted!</h1><p>You reached foe '+(S.ei+1)+' / 6. Train your ratios and try again!</p><button onclick="startGame()">Try again</button><button onclick="goHome()" style="background:#2c3a66">Home</button>';}
showStart();
</script>
</body>
</html>
