<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Team Money Changers - Family Holiday</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:-apple-system,"Helvetica Neue",Arial,sans-serif;}
  html,body{margin:0;height:100%;}
  body{background:#0c1f2b;display:flex;align-items:center;justify-content:center;overflow:hidden;color:#1d2b36;}
  #app{width:100%;max-width:1040px;min-height:560px;max-height:96vh;background:#eef6f6;position:relative;display:flex;flex-direction:column;}
  .hide{display:none!important;}
  /* status bar */
  .statusbar{background:#13455e;color:#fff;padding:7px 16px;display:flex;justify-content:space-between;align-items:center;font-weight:800;font-size:14px;flex:0 0 auto;}
  .statusbar .ttl{display:flex;align-items:center;gap:8px;}
  .homebtn{background:rgba(255,255,255,.18);border:none;color:#fff;font-weight:900;font-size:13px;border-radius:9px;padding:5px 11px;margin-right:8px;cursor:pointer;flex:0 0 auto;transition:transform .07s ease,filter .07s ease;}
  .homebtn:active{transform:scale(.92);filter:brightness(.9);}
  .statusbar .pill{background:rgba(255,255,255,.16);border-radius:16px;padding:3px 12px;margin-left:6px;}
  .statusbar .pill b{font-weight:900;font-size:16px;}
  .statusbar .time.warn{color:#ffe08a;}
  #lvlnum{display:inline-block;transition:color .35s ease;}
  #scoreNum{background:linear-gradient(90deg,#ffe14a,#ff9f1c 55%,#ff5a3c);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent;}
  .staricon{display:inline-block;color:#ffd24a;transform-origin:center;}
  .staricon.pop{animation:starpop .65s cubic-bezier(.3,1.4,.5,1);}
  @keyframes starpop{0%{transform:scale(1) rotate(0);filter:none;}30%{transform:scale(1.85) rotate(22deg);filter:drop-shadow(0 0 8px #ffd24a);}60%{transform:scale(.85) rotate(-12deg);}100%{transform:scale(1) rotate(0);filter:none;}}
  .wrap{flex:1;display:flex;flex-direction:column;padding:9px 15px;min-height:0;overflow:hidden;}
  /* story + round timer */
  .story{position:relative;overflow:hidden;border-radius:14px;background:linear-gradient(180deg,#bfe6fb,#eaf7ff);display:flex;align-items:center;gap:12px;padding:6px 13px;border:2px solid #cfe6f2;}
  .story .sun{position:absolute;right:16px;top:6px;width:32px;height:32px;border-radius:50%;background:#ffd34d;box-shadow:0 0 0 7px rgba(255,211,77,.25);}
  .story .mum{flex:0 0 auto;z-index:2;}
  .story .bubble{position:relative;background:#fff;border:3px solid #13455e;border-radius:14px;padding:7px 15px;z-index:2;flex:1;}
  .story .bubble:before{content:"";position:absolute;left:-14px;top:18px;border-width:8px 14px 8px 0;border-style:solid;border-color:transparent #13455e transparent transparent;}
  .story .bubble .hi{font-size:12px;font-weight:800;color:#0e5a7a;}
  .story .bubble .ms{font-size:16px;font-weight:900;color:#0f3a5f;line-height:1.2;}
  .story .itembig{flex:0 0 auto;z-index:2;text-align:center;background:#fff;border:2px solid #cfe6f2;border-radius:12px;padding:5px 10px;}
  .story .itembig .ic{font-size:30px;line-height:1;} .story .itembig .nm{font-size:11px;font-weight:800;color:#0e5a5a;}
  .rtimer{display:flex;align-items:center;gap:9px;margin:7px 0 3px;}
  .rtimer .lab{font-size:12px;font-weight:800;color:#13455e;white-space:nowrap;}
  .rtimer .rbarwrap{flex:1;height:14px;background:#dde7ea;border-radius:8px;overflow:hidden;}
  .rtimer .rbar{height:100%;width:100%;background:#2e9e5b;border-radius:8px;transition:width .9s linear,background .3s;}
  .rtimer .rsec{font-size:14px;font-weight:900;color:#13455e;min-width:42px;text-align:right;}
  /* rows */
  .rows{display:flex;flex-direction:column;gap:7px;margin-top:3px;}
  .row{display:grid;grid-template-columns:150px 118px 118px 150px minmax(34px,1fr) 60px;align-items:center;gap:9px;background:#fff;border:3px solid #dde7ea;border-radius:13px;padding:7px 10px;}
  .fl{display:flex;align-items:center;gap:6px;min-width:0;}
  .fl .pchip{font-size:10px;font-weight:900;color:#fff;border-radius:8px;padding:2px 6px;flex:0 0 auto;}
  .fl .fg{font-size:21px;} .fl .lm{font-size:19px;}
  .fl .cn{font-size:13px;font-weight:900;line-height:1.05;min-width:0;overflow:hidden;}.fl .cn span{display:block;font-size:9px;color:#7a8794;}
  .pr{font-size:15px;font-weight:900;color:#13395c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pr .u{font-size:9px;color:#7a8794;}
  .rt{font-size:10px;font-weight:800;color:#54616d;background:#f1f6f6;border-radius:8px;padding:4px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;}
  .conv{border:none;border-radius:11px;padding:8px 5px;font-size:13px;font-weight:900;cursor:pointer;text-align:center;width:100%;
    box-shadow:0 3px 0 rgba(0,0,0,.14);transition:transform .07s ease,box-shadow .07s ease,filter .07s ease;}
  .conv:active{transform:translateY(3px) scale(.98);box-shadow:0 0 0 rgba(0,0,0,.14);filter:brightness(.95);}
  .conv.empty{background:#ffe1b0;color:#a35a12;border:2px dashed #e8a64d;}
  .conv.empty.active{background:#ffd486;border-style:solid;box-shadow:0 3px 0 rgba(0,0,0,.14),0 0 0 3px #ffe7bd;}
  .conv.empty.active:active{box-shadow:0 0 0 3px #ffe7bd;}
  .conv.done{background:#e4f6ea;color:#1f8a4c;border:2px solid #2e9e5b;}
  .conv .big{font-size:18px;color:#0f7a3c;}
  .conv .hint{font-size:10px;font-weight:800;}
  .barwrap{background:#eef2f5;border-radius:8px;height:24px;overflow:hidden;min-width:0;}
  .bar{height:100%;border-radius:8px;background:#3a7bbf;transition:width .15s;}
  .paybtn{color:#fff;font-weight:900;font-size:12px;border:none;border-radius:13px;padding:9px 0;width:100%;background:#2e9e5b;
    box-shadow:0 4px 0 #1f7a44;transition:transform .07s ease,box-shadow .07s ease,filter .07s ease;}
  .paybtn:active{transform:translateY(4px) scale(.97);box-shadow:0 0 0 #1f7a44;filter:brightness(.96);}
  .fb{text-align:center;font-size:14px;font-weight:800;min-height:18px;margin-top:5px;flex:0 0 auto;}
  .fb.ok{color:#1f8a4c;}.fb.no{color:#c0392b;}
  /* jar + footer */
  .foot{display:flex;align-items:center;gap:12px;flex:0 0 auto;margin-top:6px;}
  .jar{flex:1;background:#fff;border:2px solid #cfe6f2;border-radius:12px;padding:5px 12px;min-width:0;}
  .jar .t{font-size:11px;font-weight:800;color:#0e5a5a;display:flex;justify-content:space-between;}
  .jbarwrap{height:13px;background:#eef2f5;border-radius:7px;overflow:hidden;margin-top:3px;}
  .jbar{height:100%;width:0;background:linear-gradient(90deg,#ffd24a,#ff9f1c);transition:width .4s;}
  .pad{display:grid;grid-template-columns:repeat(3,50px);grid-auto-rows:38px;gap:6px;}
  .pad .k{width:100%;height:100%;border:none;border-radius:9px;background:#dbe7ea;color:#13395c;font-size:17px;font-weight:800;}
  .pad .k:active{transform:scale(.92);}
  .calcbtn{background:#15557a;color:#fff;border:none;border-radius:11px;padding:11px 14px;font-size:13px;font-weight:800;}
  /* calculator (draggable) */
  .calc{position:absolute;left:50%;top:90px;width:260px;background:#0f2435;border-radius:18px;padding:12px;z-index:30;box-shadow:0 14px 40px rgba(0,0,0,.5);touch-action:none;}
  .calc .chandle{display:flex;align-items:center;justify-content:center;gap:7px;color:#bcd2e6;font-size:12px;font-weight:800;padding:1px 0 8px;cursor:move;touch-action:none;user-select:none;}
  .calc .chandle .grip{letter-spacing:2px;font-size:14px;}
  .calc .disp{background:#cfe6d6;color:#10331f;border-radius:9px;text-align:right;font-size:25px;font-weight:900;padding:8px 12px;margin-bottom:8px;}
  .calc .ks{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
  .calc .k{border:none;border-radius:10px;padding:12px 0;font-size:18px;font-weight:800;background:#e9eef3;color:#13395c;}
  .calc .op{background:#f0a93c;color:#fff;}.calc .eq{background:#2e9e5b;color:#fff;}.calc .clr{background:#e0556a;color:#fff;}
  .calc .close{position:absolute;top:-13px;right:-13px;width:34px;height:34px;border-radius:50%;background:#e0556a;color:#fff;border:none;font-size:18px;font-weight:900;}
  /* overlay */
  .ov{position:absolute;inset:0;background:rgba(12,31,43,.96);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;z-index:40;overflow:auto;}
  .ov h1{font-size:28px;margin:6px 0;}.ov p{font-size:14.5px;max-width:720px;line-height:1.55;opacity:.95;}
  .ov .big{font-size:52px;}
  .ov .roles{display:flex;gap:10px;margin:12px 0 4px;flex-wrap:wrap;justify-content:center;}
  .ov .rc{border-radius:12px;padding:8px 14px;font-weight:900;font-size:14px;color:#fff;}
  .ov button{margin-top:16px;background:#2e9e5b;color:#fff;border:none;border-radius:14px;padding:13px 38px;font-size:18px;font-weight:900;}
  /* concise visual start screen */
  .startcard{background:#fff;border-radius:24px;padding:20px 26px 24px;max-width:660px;color:#13455e;box-shadow:0 18px 50px rgba(0,0,0,.45);}
  .startcard .ttl{font-size:24px;font-weight:900;color:#0f3a5f;text-align:center;margin-bottom:2px;}
  .mumrow{display:flex;align-items:center;justify-content:center;gap:12px;margin:10px 0 4px;}
  .mumrow .say{font-size:18px;font-weight:900;color:#0f3a5f;background:#eaf7ff;border:2.5px solid #cfe6f2;border-radius:15px;padding:9px 15px;}
  .flow{display:flex;align-items:center;justify-content:center;gap:6px;margin:16px 0 8px;}
  .stepc{flex:1;background:#f6fbfc;border:2px solid #e1edf1;border-radius:16px;padding:10px 6px 12px;text-align:center;}
  .stepc .tx{font-size:14px;font-weight:900;color:#13455e;margin-top:4px;line-height:1.25;}
  .flow .arr{font-size:26px;color:#9fb6c9;font-weight:900;flex:0 0 auto;}
  .hintline{display:flex;align-items:center;justify-content:center;gap:18px;font-size:15px;font-weight:900;color:#5f6b76;margin-top:6px;}
  .hintline span{display:inline-flex;align-items:center;gap:6px;}
</style>
</head>
<body>
<div id="app">
  <div class="statusbar">
    <div class="ttl"><button class="homebtn" onclick="goHome()">&#8962; Home</button>&#9992; Family Holiday &middot; Team Money Changers</div>
    <div><span class="pill">Level <b id="lvlnum">1</b></span><span class="pill"><span id="starIcon" class="staricon">&#9733;</span> <b id="scoreNum">0</b></span><span class="pill time" id="time">5:00</span></div>
  </div>
  <div class="wrap" id="game"></div>
  <div class="calc hide" id="calcbox"></div>
  <div class="ov" id="overlay"></div>
</div>
<script>
"use strict";
var CUR=[
 {cc:"JP",country:"Japan",ccy:"JPY",flag:"🇯🇵",lm:"🗼",rate:18},
 {cc:"KR",country:"Korea",ccy:"KRW",flag:"🇰🇷",lm:"🏯",rate:170},
 {cc:"TH",country:"Thailand",ccy:"THB",flag:"🇹🇭",lm:"🛕",rate:5},
 {cc:"ID",country:"Indonesia",ccy:"IDR",flag:"🇮🇩",lm:"🏝️",rate:2000},
 {cc:"PH",country:"Philippines",ccy:"PHP",flag:"🇵🇭",lm:"🏖️",rate:7}
];
var ITEMS=[["Backpack","🎒"],["Sneakers","👟"],["Headphones","🎧"],["Camera","📷"],["Watch","⌚"],["T-shirt","👕"],["Cap","🧢"],["Doll","🧸"],["Sunglasses","🕶️"],["Mug","☕"]];
var CITIES=["Tokyo","Seoul","Bangkok","Jakarta","Manila","Singapore"];
var CITY_TARGET=200;
var ASKS=["Each of you take one country &mdash; which is cheapest to pay?",
          "Quick team, convert your own price! Which currency is cheapest?",
          "Help Mum save money &mdash; everyone convert, then pick the cheapest!",
          "Four shops, four of you! Which currency is the best deal?"];

function mum(s){return ('<svg width="'+s+'" height="'+s+'" viewBox="0 0 100 100">'
 +'<path d="M20 112 q30 -30 60 0 v6 h-60 Z" fill="#e0556a"/>'
 +'<circle cx="50" cy="50" r="28" fill="#ffd9b3" stroke="#e0b48a" stroke-width="2"/>'
 +'<path d="M22 50 q0 -30 28 -30 q28 0 28 30 q-6 -14 -28 -14 q-22 0 -28 14 Z" fill="#6b4a2b"/>'
 +'<circle cx="50" cy="16" r="7" fill="#6b4a2b"/>'
 +'<circle cx="40" cy="50" r="3.2" fill="#3a2a1a"/><circle cx="60" cy="50" r="3.2" fill="#3a2a1a"/>'
 +'<path d="M42 62 q8 7 16 0" fill="none" stroke="#b5563a" stroke-width="3" stroke-linecap="round"/>'
 +'<circle cx="34" cy="58" r="3.6" fill="#ffb3b3" opacity="0.7"/><circle cx="66" cy="58" r="3.6" fill="#ffb3b3" opacity="0.7"/>'
 +'</svg>');}

var S={level:1,score:0,saved:0,city:0,t:300,rt:40,rtMax:40,rows:[],entered:[],active:0,item:null,ask:"",locked:false,timer:null};

/* ---- concise visual start screen ---- */
function coinC(cx,cy,r,fill,stroke,sym,fs){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="3"/>'
 +'<text x="'+cx+'" y="'+(cy+fs*0.34)+'" text-anchor="middle" font-family="Arial" font-size="'+fs+'" font-weight="900" fill="'+stroke+'">'+sym+'</text>';}
function icoForeign(){return '<svg width="104" height="74" viewBox="0 0 140 100">'
 +coinC(34,54,28,'#ffe08a','#d99a2b','&#165;',26)+coinC(72,46,28,'#ffd2d2','#d6584a','&#8361;',24)+coinC(106,56,28,'#cfeacb','#3f9e4f','&#3647;',24)+'</svg>';}
function icoConvert(){return '<svg width="104" height="74" viewBox="0 0 150 100">'
 +'<text x="14" y="62" font-family="Arial" font-size="30" font-weight="900" fill="#9fb6c9">&#165;&#8361;</text>'
 +'<path d="M62 50 H96" stroke="#9fb6c9" stroke-width="6" stroke-linecap="round"/><path d="M90 39 L106 50 L90 61 Z" fill="#9fb6c9"/>'
 +coinC(126,50,26,'#bfe0fb','#2f7eb5','$',26)+'</svg>';}
function icoCheap(){return '<svg width="104" height="74" viewBox="0 0 140 100">'
 +coinC(42,54,28,'#cfeacb','#3f9e4f','$',26)
 +'<circle cx="98" cy="42" r="24" fill="#2e9e5b"/><path d="M86 43 l8 9 l16 -19" stroke="#fff" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round"/>'
 +'</svg>';}
function goHome(){if(S.timer)clearInterval(S.timer);$('calcbox').classList.add('hide');showStart();}
function showStart(){
 $('overlay').classList.remove('hide');
 $('overlay').innerHTML='<div class="startcard">'
  +'<div class="ttl">&#9992;&#65039; Pay the Smart Way</div>'
  +'<div class="mumrow">'+mum(64)+'<div class="say">Help Mum pay the <b>cheapest</b> way!</div></div>'
  +'<div class="flow">'
   +'<div class="stepc">'+icoForeign()+'<div class="tx">Prices in<br>foreign money</div></div>'
   +'<div class="arr">&#8594;</div>'
   +'<div class="stepc">'+icoConvert()+'<div class="tx">Change each<br>to <b>HK$</b></div></div>'
   +'<div class="arr">&#8594;</div>'
   +'<div class="stepc">'+icoCheap()+'<div class="tx">Tap the<br><b>cheapest</b> to pay</div></div>'
  +'</div>'
  +'<div class="hintline"><span>&#9201; beat the timer</span><span>&#128101; team up</span></div>'
  +'<button onclick="startGame()">Play</button>'
 +'</div>';
}
function $(id){return document.getElementById(id);}
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=rnd(0,i),t=a[i];a[i]=a[j];a[j]=t;}return a;}

/* correct-answer sound (Web Audio, offline) */
var actx=null;
function ensureAudio(){try{if(!actx)actx=new (window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();}catch(e){}}
function playDing(){ensureAudio();if(!actx)return;try{var t=actx.currentTime;var notes=[659.25,783.99,1046.5,1318.5];
 notes.forEach(function(f,i){var o=actx.createOscillator(),g=actx.createGain();o.type='triangle';o.frequency.value=f;
  o.connect(g);g.connect(actx.destination);var st=t+i*0.085;
  g.gain.setValueAtTime(0.0001,st);g.gain.exponentialRampToValueAtTime(0.28,st+0.02);g.gain.exponentialRampToValueAtTime(0.0001,st+0.22);
  o.start(st);o.stop(st+0.25);});}catch(e){}}
function buzz(){ensureAudio();if(!actx)return;try{var t=actx.currentTime;var o=actx.createOscillator(),g=actx.createGain();
 o.type='sawtooth';o.frequency.setValueAtTime(220,t);o.frequency.exponentialRampToValueAtTime(110,t+0.4);
 o.connect(g);g.connect(actx.destination);g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.2,t+0.02);g.gain.exponentialRampToValueAtTime(0.0001,t+0.45);
 o.start(t);o.stop(t+0.5);}catch(e){}}
function popStar(){var s=$('starIcon');if(!s)return;s.classList.remove('pop');void s.offsetWidth;s.classList.add('pop');}

function startGame(){ensureAudio();S.level=1;S.score=0;S.saved=0;S.city=0;S.t=300;
 $('overlay').classList.add('hide');$('calcbox').classList.add('hide');
 if(S.timer)clearInterval(S.timer);S.timer=setInterval(tick,1000);newOrder();}
function tick(){
 S.t--;upTime();
 if(!S.locked){S.rt--;upRound();if(S.rt<=0){roundTimeout();}}
 if(S.t<=0){clearInterval(S.timer);endGame();}
}
function upTime(){var m=Math.floor(S.t/60),s=S.t%60;var e=$('time');if(e){e.textContent=m+":"+(s<10?"0":"")+s;e.classList.toggle('warn',S.t<=60);}}
function upRound(){var b=$('rbar'),sec=$('rsec');if(!b)return;var p=Math.max(0,S.rt/S.rtMax*100);b.style.width=p+'%';
 b.style.background=S.rt<=8?'#e0556a':S.rt<=18?'#f0a93c':'#2e9e5b';
 if(sec){var rr=Math.max(0,S.rt),m=Math.floor(rr/60),s=rr%60;sec.textContent=m+":"+(s<10?"0":"")+s;}}

// Warm-up: first 3 orders use 2 countries; from level 4 onward use all 4.
function numCountries(){return S.level<=3?2:4;}
// Enough time to convert every country then take turns typing on the one shared
// keypad and discuss the cheapest. Scales with how many countries are shown and
// eases gently as levels rise (bigger numbers already add difficulty).
function roundBudget(n){var per=Math.max(11,18-Math.floor(S.level/2));return n*per;}
function newOrder(){
 var n=numCountries();
 var curs=shuffle(CUR.slice()).slice(0,n);
 var hi=120+S.level*10;if(hi>300)hi=300;
 var pool=[];for(var v=50;v<=hi;v+=10)pool.push(v);
 var vals=shuffle(pool).slice(0,n);
 // guarantee a unique minimum
 vals.sort(function(a,b){return a-b;});if(vals[0]===vals[1])vals[0]-=10;shuffle(vals);
 S.rows=curs.map(function(c,i){return {cc:c.cc,country:c.country,ccy:c.ccy,flag:c.flag,lm:c.lm,rate:c.rate,hkd:vals[i],price:vals[i]*c.rate,owner:i};});
 S.entered=S.rows.map(function(){return "";});
 S.active=0;S.locked=false;
 S.item=ITEMS[rnd(0,ITEMS.length-1)];
 S.ask=ASKS[rnd(0,ASKS.length-1)];
 S.rtMax=roundBudget(n);S.rt=S.rtMax;
 render();upRound();
}
function maxHKD(){var m=0;S.rows.forEach(function(r){if(r.hkd>m)m=r.hkd;});return m;}

function render(){
 var mx=maxHKD();
 var rowsH="";
 for(var i=0;i<S.rows.length;i++){
   var r=S.rows[i];var ent=S.entered[i];
   var bw=ent!==""?Math.min(100,parseInt(ent,10)/mx*100):0;
   var conv = ent!==""
     ? '<button class="conv done" onclick="sel('+i+')">= HK$ <span class="big">'+ent+'</span></button>'
     : '<button class="conv empty'+(S.active===i?' active':'')+'" onclick="sel('+i+')"><div class="hint">tap &amp; type</div>HK$ ?</button>';
   rowsH+='<div class="row">'+
     '<div class="fl"><span class="lm">'+r.lm+'</span><span class="fg">'+r.flag+'</span><span class="cn">'+r.country+'<span>'+r.ccy+'</span></span></div>'+
     '<div class="pr">'+r.price.toLocaleString()+' <span class="u">'+r.ccy+'</span></div>'+
     '<div class="rt">HK$1 = '+r.rate+' '+r.ccy+'</div>'+
     conv+
     '<div class="barwrap"><div class="bar" style="width:'+bw+'%"></div></div>'+
     '<button class="paybtn" onclick="pay('+i+')">PAY</button>'+
   '</div>';
 }
 var pad="";["1","2","3","4","5","6","7","8","9","C","0","DEL"].forEach(function(k){var lab=k==="DEL"?"⌫":k;pad+='<button class="k" onclick="key(\''+k+'\')">'+lab+'</button>';});
 var nextCity=CITIES[Math.min(S.city+1,CITIES.length-1)];
 var curBase=S.city*CITY_TARGET;var jp=Math.max(0,Math.min(100,(S.saved-curBase)/CITY_TARGET*100));
 $('game').innerHTML=
   '<div class="story"><div class="sun"></div>'+
     '<div class="mum">'+mum(64)+'</div>'+
     '<div class="bubble"><div class="hi">Mum &middot; now in '+CITIES[Math.min(S.city,CITIES.length-1)]+'</div><div class="ms">'+S.ask+'</div></div>'+
     '<div class="itembig"><div class="ic">'+S.item[1]+'</div><div class="nm">'+S.item[0]+'</div></div>'+
   '</div>'+
   '<div class="rtimer"><span class="lab">&#9201; This order:</span><div class="rbarwrap"><div class="rbar" id="rbar"></div></div><span class="rsec" id="rsec">0:00</span></div>'+
   '<div class="rows">'+rowsH+'</div>'+
   '<div class="fb" id="fb">Everyone: convert YOUR country to HK$, then pick the cheapest together.</div>'+
   '<div class="foot"><button class="calcbtn" onclick="toggleCalc()">&#129518; Calculator</button>'+
     '<div class="jar"><div class="t"><span>&#127881; Trip Savings &rarr; '+nextCity+'</span><span>HK$ '+(S.saved-curBase)+' / '+CITY_TARGET+'</span></div>'+
       '<div class="jbarwrap"><div class="jbar" style="width:'+jp+'%"></div></div></div>'+
     '<div class="pad">'+pad+'</div></div>';
 var ln=$('lvlnum');ln.textContent=S.level;var lc=levelColor(S.level);ln.style.color=lc;ln.style.textShadow=S.level>=5?('0 0 9px '+lc):'none';
 $('scoreNum').textContent=S.score;
}
var LVCOL=['#9fb6c9','#4ab8d6','#27b56e','#f2c200','#ff9a1f','#ff6a2c','#ff2e6e','#d126d3','#7c3aed'];
function levelColor(lv){return LVCOL[Math.min(lv-1,LVCOL.length-1)];}

function sel(i){if(S.locked)return;S.active=i;render();upRound();}
function key(k){if(S.locked||S.active<0)return;var e=S.entered[S.active];
 if(k==="C")e="";else if(k==="DEL")e=e.slice(0,-1);else if(e.length<7)e=(e==="0"?"":e)+k;
 S.entered[S.active]=e;render();upRound();}
function flash(m,c){var e=$('fb');if(e){e.textContent=m;e.className='fb '+(c==='ok'?'ok':c==='no'?'no':'');}}

function roundTimeout(){
 S.locked=true;buzz();
 render();flash("Time's up! Everyone help convert — split the countries.",'no');
 setTimeout(function(){if(S.t>0)newOrder();},1600);
}
function pay(i){
 if(S.locked)return;
 for(var j=0;j<S.rows.length;j++){if(S.entered[j]===""){S.active=j;render();upRound();flash('Still missing '+S.rows[j].country+' — everyone help convert first!','no');return;}}
 var wrong=[];for(var k=0;k<S.rows.length;k++){if(parseInt(S.entered[k],10)!==S.rows[k].hkd)wrong.push(S.rows[k].country);}
 if(wrong.length){render();upRound();flash('Re-check: '+wrong.join(', '),'no');return;}
 var min=Math.min.apply(null,S.rows.map(function(r){return r.hkd;}));
 var max=maxHKD();
 if(S.rows[i].hkd===min){
   S.locked=true;var pts=10*S.level;S.score+=pts;var save=max-min;S.saved+=save;
   $('scoreNum').textContent=S.score;
   playDing();popStar();bigFeed('💰');
   var arrived=(S.saved>=(S.city+1)*CITY_TARGET)&&(S.city<CITIES.length-1);
   if(arrived){S.city++;}
   flash('Smart! '+S.rows[i].country+' is cheapest (HK$'+min+'). +'+pts+' · saved HK$'+save+(arrived?(' · ✈ Arrived in '+CITIES[S.city]+'!'):''),'ok');
   if(arrived)setTimeout(function(){bigFeed('🛬');},500);
   S.level++;setTimeout(function(){if(S.t>0)newOrder();},1500);
 } else {
   var pen=5*S.level;S.score=Math.max(0,S.score-pen);
   render();upRound();flash('Not the cheapest — compare the HK$ bars! (-'+pen+' points)','no');
 }
}
function bigFeed(e){var d=document.createElement('div');d.textContent=e;d.style.cssText='position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:104px;z-index:35;pointer-events:none;';$('app').appendChild(d);setTimeout(function(){d.remove();},1200);}
function endGame(){$('calcbox').classList.add('hide');$('overlay').classList.remove('hide');
 $('overlay').innerHTML='<div class="big">&#9201;&#65039;&#127942;</div><h1>Time&#39;s up!</h1><p>Great teamwork! Final score:</p>'+
 '<div style="font-size:54px;font-weight:900;color:#ffd24a">&#9733; '+S.score+'</div>'+
 '<p>You reached <b>Level '+S.level+'</b> and saved <b>HK$'+S.saved+'</b> for the trip &mdash; now in <b>'+CITIES[Math.min(S.city,CITIES.length-1)]+'</b>.</p>'+
 '<button onclick="startGame()">Play again</button>';}

/* calculator (draggable) */
var C={disp:"0",acc:null,op:null,fresh:true};
function toggleCalc(){var b=$('calcbox');if(b.classList.contains('hide')){b.classList.remove('hide');
  if(!b.dataset.moved){var app=$('app');b.style.left=Math.max(8,(app.clientWidth-260)/2)+'px';b.style.top='96px';}
  renderCalc();}else b.classList.add('hide');}
var DG={on:false,dx:0,dy:0};
function dragStart(e){var b=$('calcbox');var r=b.getBoundingClientRect();var p=e.touches?e.touches[0]:e;
  DG.on=true;DG.dx=p.clientX-r.left;DG.dy=p.clientY-r.top;b.dataset.moved="1";if(e.preventDefault)e.preventDefault();}
function dragMove(e){if(!DG.on)return;var b=$('calcbox');var app=$('app').getBoundingClientRect();var p=e.touches?e.touches[0]:e;
  var x=p.clientX-app.left-DG.dx,y=p.clientY-app.top-DG.dy;
  x=Math.max(0,Math.min(app.width-b.offsetWidth,x));y=Math.max(0,Math.min(app.height-b.offsetHeight,y));
  b.style.left=x+'px';b.style.top=y+'px';if(e.preventDefault)e.preventDefault();}
function dragEnd(){DG.on=false;}
window.addEventListener('pointermove',dragMove,{passive:false});
window.addEventListener('pointerup',dragEnd);
window.addEventListener('touchmove',dragMove,{passive:false});
window.addEventListener('touchend',dragEnd);
function fmt(n){return (Math.round(n*10000)/10000).toString();}
function cD(d){if(C.fresh){C.disp=(d==="."?"0.":d);C.fresh=false;}else{if(d==="."&&C.disp.indexOf(".")>=0)return;C.disp=(C.disp==="0"&&d!==".")?d:C.disp+d;}renderCalc();}
function cO(o){if(C.op!==null&&!C.fresh){C.acc=ap(C.acc,parseFloat(C.disp),C.op);C.disp=fmt(C.acc);}else C.acc=parseFloat(C.disp);C.op=o;C.fresh=true;renderCalc();}
function cE(){if(C.op!==null){C.acc=ap(C.acc,parseFloat(C.disp),C.op);C.disp=fmt(C.acc);C.op=null;C.fresh=true;renderCalc();}}
function cC(){C.disp="0";C.acc=null;C.op=null;C.fresh=true;renderCalc();}
function cB(){if(C.fresh)return;C.disp=C.disp.length>1?C.disp.slice(0,-1):"0";renderCalc();}
function ap(a,b,o){return o==="+"?a+b:o==="-"?a-b:o==="*"?a*b:(b===0?0:a/b);}
function renderCalc(){
 var keys=[['7','d'],['8','d'],['9','d'],['÷','/'],['4','d'],['5','d'],['6','d'],['×','*'],['1','d'],['2','d'],['3','d'],['−','-'],['0','d'],['.','d'],['⌫','b'],['+','+']];
 var h='<button class="close" onclick="toggleCalc()">&times;</button>'+
  '<div class="chandle" onpointerdown="dragStart(event)" ontouchstart="dragStart(event)"><span class="grip">&#8942;&#8942;</span> drag me</div>'+
  '<div class="disp">'+C.disp+'</div><div class="ks">'+
  '<button class="k clr" style="grid-column:span 4" onclick="cC()">Clear</button>';
 keys.forEach(function(k){var l=k[0],t=k[1];
  if(t==='d')h+='<button class="k" onclick="cD(\''+l+'\')">'+l+'</button>';
  else if(t==='b')h+='<button class="k" onclick="cB()">'+l+'</button>';
  else h+='<button class="k op" onclick="cO(\''+t+'\')">'+l+'</button>';});
 h+='<button class="k eq" style="grid-column:span 4" onclick="cE()">=</button></div>';
 $('calcbox').innerHTML=h;
}
showStart();
</script>
