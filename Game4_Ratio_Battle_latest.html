<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ratio Quest - Save the Princess</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:-apple-system,"Helvetica Neue",Arial,sans-serif;}
  html,body{margin:0;height:100%;}
  body{background:#0b0b1f;display:flex;align-items:center;justify-content:center;overflow:hidden;color:#1d2b36;}
  #app{width:100%;max-width:1000px;min-height:560px;max-height:96vh;background:#5c94fc;position:relative;display:flex;flex-direction:column;}
  .hide{display:none!important;}
  .statusbar{background:#c4281c;color:#fff;padding:7px 16px;display:flex;justify-content:space-between;align-items:center;font-weight:800;font-size:14px;flex:0 0 auto;border-bottom:4px solid #7a0f0a;}
  .statusbar .ttl{display:flex;align-items:center;gap:8px;}
  .homebtn{background:rgba(255,255,255,.22);border:none;color:#fff;font-weight:900;font-size:13px;border-radius:9px;padding:5px 11px;margin-right:8px;cursor:pointer;}
  .homebtn:active{transform:scale(.92);}
  .statusbar .pill{background:rgba(255,255,255,.18);border-radius:16px;padding:3px 12px;margin-left:6px;}
  .statusbar .pill b{font-weight:900;font-size:16px;}
  .wrap{flex:1;display:flex;flex-direction:column;min-height:0;position:relative;}
  /* arena */
  .arena{flex:1;position:relative;overflow:hidden;min-height:0;}
  .ground{position:absolute;left:0;right:0;bottom:0;height:34px;background:repeating-linear-gradient(90deg,#d87f33 0 18px,#c9722a 18px 20px);border-top:4px solid #7a4a1a;}
  .brickrow{position:absolute;left:0;right:0;top:0;height:0;}
  .cloudbg{position:absolute;border-radius:40px;background:rgba(255,255,255,.85);}
  .hill{position:absolute;bottom:30px;border-radius:50% 50% 0 0;background:#3aa64a;}
  .foe{position:absolute;right:6%;top:30px;text-align:center;z-index:3;}
  .me{position:absolute;left:6%;bottom:30px;text-align:center;z-index:3;}
  .nameTag{display:inline-flex;align-items:center;gap:6px;background:#fff;border:2px solid #2a2a4a;border-radius:10px;padding:3px 11px;font-weight:900;font-size:13px;color:#22303a;box-shadow:0 3px 8px rgba(0,0,0,.25);}
  .lv{font-size:10px;color:#6b7884;font-weight:800;}
  .type{font-size:9px;font-weight:900;color:#fff;border-radius:9px;padding:1px 7px;}
  .hpwrap{display:flex;align-items:center;gap:5px;margin-top:3px;justify-content:center;}
  .hpl{font-size:10px;font-weight:900;color:#fff;text-shadow:0 1px 2px #000;}
  .hpbar{width:150px;height:12px;background:#3a3a4a;border:1.5px solid #1a1a2a;border-radius:6px;overflow:hidden;}
  .hpbar i{display:block;height:100%;transition:width .4s;}
  .hpnum{font-size:10px;font-weight:900;color:#fff;margin-top:1px;text-shadow:0 1px 2px #000;}
  .xpwrap{display:flex;align-items:center;gap:5px;margin-top:2px;justify-content:center;}
  .xpl{font-size:9px;font-weight:900;color:#fff;text-shadow:0 1px 2px #000;}
  .xpbar{width:150px;height:7px;background:#2a2a4a;border:1.5px solid #1a1a2a;border-radius:5px;overflow:hidden;}
  .xpbar i{display:block;height:100%;background:linear-gradient(90deg,#3cc0ff,#7be0ff);transition:width .4s;}
  .mon{transition:transform .12s;}
  .mon.hit{animation:shake .4s;}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
  .speech{position:absolute;top:-6px;left:50%;transform:translateX(-50%) translateY(-100%);background:#fff;border:2.5px solid #2a2a4a;border-radius:12px;padding:5px 12px;font-size:12px;font-weight:900;color:#2a2a4a;white-space:nowrap;z-index:6;box-shadow:0 3px 8px rgba(0,0,0,.2);}
  .speech:after{content:"";position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);border-width:9px 7px 0 7px;border-style:solid;border-color:#2a2a4a transparent transparent transparent;}
  .dmg{position:absolute;font-size:30px;font-weight:900;color:#ffec3d;text-shadow:0 2px 0 #c4281c,0 0 4px #000;z-index:7;pointer-events:none;animation:dfloat 1s ease forwards;}
  .dmg.heal{color:#7bff7b;text-shadow:0 2px 0 #1f7a44,0 0 4px #000;}
  @keyframes dfloat{0%{opacity:0;transform:translateY(0) scale(.6);}20%{opacity:1;transform:translateY(-10px) scale(1.1);}100%{opacity:0;transform:translateY(-46px) scale(1);}}
  /* captured princess (final boss) */
  .cage{position:absolute;right:6%;top:2px;z-index:2;text-align:center;}
  .cagebars{position:relative;display:inline-block;}
  .cagebars:before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(90deg,rgba(120,120,140,.85) 0 3px,transparent 3px 13px);border:3px solid #9a9ab0;border-radius:8px;pointer-events:none;}
  .cagelbl{font-size:10px;font-weight:900;color:#fff;text-shadow:0 1px 2px #000;}
  /* inventory top-left */
  .inv{position:absolute;left:8px;top:8px;z-index:8;display:flex;gap:5px;background:rgba(0,0,0,.35);padding:5px 6px;border-radius:12px;border:2px solid rgba(255,255,255,.35);}
  .invslot{position:relative;width:40px;height:40px;border:none;border-radius:9px;background:rgba(255,255,255,.92);font-size:21px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 0 rgba(0,0,0,.3);}
  .invslot:active{transform:translateY(3px);box-shadow:0 0 0 rgba(0,0,0,.3);}
  .invslot.empty{opacity:.32;}
  .invslot .invn{position:absolute;right:-4px;bottom:-5px;background:#c4281c;color:#fff;font-size:10px;font-weight:900;border-radius:8px;padding:0 4px;border:1.5px solid #fff;}
  .invslot .lab1up{font-size:11px;font-weight:900;color:#1f9a4c;}
  /* bottom panel */
  .panel{flex:0 0 auto;background:#1a1430;border-top:5px solid #c4281c;padding:9px 12px;min-height:160px;display:flex;gap:10px;}
  .msg{flex:1;background:#0d0a1f;border:2px solid #4a3a7a;border-radius:12px;padding:10px 14px;color:#fff;font-weight:800;font-size:14px;display:flex;align-items:center;}
  .msg b{color:#ffec3d;}
  .moves{flex:1.35;display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;align-content:start;}
  .mv{border:none;border-radius:11px;padding:7px 8px;color:#fff;font-weight:900;font-size:12px;text-align:left;box-shadow:0 4px 0 rgba(0,0,0,.35);cursor:pointer;line-height:1.1;}
  .mv:active{transform:translateY(4px);box-shadow:0 0 0 rgba(0,0,0,.35);}
  .mv small{display:block;font-size:9px;font-weight:700;opacity:.95;margin-top:1px;}
  .mv[disabled]{opacity:.4;}
  .m1{background:#2f7eb5;}.m2{background:#e0922f;}.m3{background:#3aa64a;}.m4{background:#8a5cd0;}.m5{background:#c4281c;}.m6{background:#2e9e5b;}
  /* puzzle panel */
  .puz{flex:1.35;background:#0d0a1f;border:2px solid #4a3a7a;border-radius:12px;padding:8px 10px;display:flex;flex-direction:column;gap:6px;}
  .puz .ph{display:flex;align-items:center;justify-content:space-between;color:#fff;font-weight:900;font-size:12px;}
  .puz .ph .rt{color:#ffec3d;}
  .ratio{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;background:#fff;border-radius:11px;padding:8px;}
  .chip{display:inline-flex;align-items:center;justify-content:center;min-width:44px;height:48px;padding:0 8px;border-radius:11px;color:#fff;font-size:23px;font-weight:900;box-shadow:0 3px 0 rgba(0,0,0,.2);}
  .colon{font-size:22px;font-weight:900;color:#9b8ac4;}
  .facs{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
  .fac{background:#ffe7b0;color:#7a4a12;border:2px solid #e0b86a;border-radius:9px;font-size:15px;font-weight:900;padding:7px 11px;cursor:pointer;box-shadow:0 3px 0 #e0b86a;}
  .fac:active{transform:translateY(3px);box-shadow:0 0 0 #e0b86a;}
  .lcard{display:flex;align-items:center;gap:8px;background:#fff;border-radius:10px;padding:5px 9px;}
  .lhdr{flex:0 0 92px;font-size:11px;font-weight:900;color:#3a2270;}
  .lb{background:#ffe7b0;color:#7a4a12;border:2px solid #e0b86a;border-radius:8px;font-size:13px;font-weight:900;padding:5px 8px;cursor:pointer;box-shadow:0 3px 0 #e0b86a;}
  .lbtns{margin-left:auto;display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end;}
  .chip.sh{box-shadow:0 3px 0 rgba(0,0,0,.2),0 0 0 3px #ffec3d;}
  .chip.gsh{animation:gshpulse .85s infinite;}
  @keyframes gshpulse{0%,100%{box-shadow:0 3px 0 rgba(0,0,0,.2),0 0 0 3px #ffec3d,0 0 6px #ffec3d;}50%{box-shadow:0 3px 0 rgba(0,0,0,.2),0 0 0 6px #ffec3d,0 0 18px #ffec3d;}}
  .lcmq{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:center;color:#fff;font-size:14px;font-weight:900;}
  .lcmopt{font-size:15px;}
  .okmark{color:#7bff7b;font-size:20px;font-weight:900;}
  .mblock{background:#3a2a66;width:100%;grid-column:span 3;font-size:15px;text-align:center;border:2px solid #7b93d6;}
  .forcemsg{grid-column:span 3;color:#ffec3d;font-weight:900;font-size:12px;text-align:center;}
  .moves.one{grid-template-columns:1fr;}
  .minions{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:2px;}
  .minion{filter:drop-shadow(0 0 4px #b07bff);}
  .shieldlbl{font-size:10px;font-weight:900;color:#fff;background:#6a4fb0;border-radius:8px;padding:2px 7px;}
  .weaktag{margin-top:5px;font-size:14px;font-weight:900;color:#fff;background:linear-gradient(90deg,#e0922f,#c4281c);border:2.5px solid #ffec3d;border-radius:11px;padding:5px 13px;display:inline-block;animation:weakpulse 1.3s infinite;}
  .weaktag b{color:#ffec3d;font-size:17px;text-shadow:0 1px 2px #000;}
  .weaktag .res{font-size:11px;color:#ffd2d2;font-weight:800;}
  @keyframes weakpulse{0%,100%{box-shadow:0 0 5px 1px rgba(255,236,61,.55);}50%{box-shadow:0 0 16px 5px rgba(255,236,61,.95);}}
  .mv.weakmv{animation:mvpulse 1.1s infinite;}
  @keyframes mvpulse{0%,100%{box-shadow:0 4px 0 rgba(0,0,0,.35),0 0 0 3px #ffec3d,0 0 5px #ffec3d;}50%{box-shadow:0 4px 0 rgba(0,0,0,.35),0 0 0 4px #ffec3d,0 0 16px #ffec3d;}}
  .mv .supbadge{display:inline-block;background:#ffec3d;color:#c4281c;border-radius:6px;padding:0 5px;font-size:10px;font-weight:900;margin-right:4px;vertical-align:middle;}
  .mon.charging{animation:chargeglow .5s infinite;}
  @keyframes chargeglow{0%,100%{filter:drop-shadow(0 0 4px #ffec3d)}50%{filter:drop-shadow(0 0 16px #ffae00)}}
  .mon.shielded{filter:drop-shadow(0 0 8px #b07bff);}
  .mon.starman{animation:starblink .18s infinite;}
  @keyframes starblink{0%{filter:drop-shadow(0 0 8px #ffec3d)}50%{filter:drop-shadow(0 0 8px #3cc0ff) hue-rotate(90deg)}100%{filter:drop-shadow(0 0 8px #ff5a8a)}}
  .stunwrap{animation:wobble .55s infinite;transform-origin:50% 85%;}
  @keyframes wobble{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
  .stunfx{position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:18px;z-index:4;animation:bob 1s ease-in-out infinite;}
  @keyframes bob{0%,100%{opacity:.65;transform:translateX(-50%) translateY(0)}50%{opacity:1;transform:translateX(-50%) translateY(-5px)}}
  .quizq{background:#fff;border-radius:10px;padding:9px 12px;font-size:16px;font-weight:900;color:#2e1b5e;text-align:center;}
  .qopts{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
  .qopt{background:#ffe7b0;color:#7a4a12;border:2px solid #e0b86a;border-radius:9px;font-size:15px;font-weight:900;padding:9px 0;cursor:pointer;box-shadow:0 3px 0 #e0b86a;}
  .qopt:active{transform:translateY(3px);box-shadow:0 0 0 #e0b86a;}
  .prow{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-top:auto;}
  .back{background:#3a2a66;color:#fff;border:none;border-radius:9px;padding:8px 12px;font-weight:900;font-size:12px;cursor:pointer;}
  .atk{background:#c4281c;color:#fff;border:none;border-radius:10px;padding:9px 22px;font-weight:900;font-size:15px;box-shadow:0 4px 0 #7a0f0a;cursor:pointer;}
  .atk:active{transform:translateY(4px);box-shadow:0 0 0 #7a0f0a;}
  .hint{font-size:10.5px;font-weight:800;color:#bfb0e6;text-align:center;}
  .qf{display:inline-flex;flex-direction:column;vertical-align:middle;text-align:center;line-height:1.02;margin:0 2px;}
  .qf .qn{border-bottom:2px solid currentColor;padding:0 4px;font-size:.78em;}
  .qf .qd{padding:0 4px;font-size:.78em;}
  .quizq sup,.qopt sup{font-size:.65em;}
  /* fx */
  .fx{position:absolute;z-index:22;pointer-events:none;font-weight:900;color:#fff;display:flex;align-items:center;justify-content:center;}
  .fx.ball{min-width:28px;height:28px;border-radius:50%;font-size:15px;box-shadow:0 0 9px rgba(0,0,0,.35);}
  .fx.bomb{min-width:30px;height:30px;border-radius:9px;font-size:15px;box-shadow:0 3px 0 rgba(0,0,0,.3);}
  .fx.orb{width:22px;height:22px;border-radius:50%;box-shadow:0 0 12px currentColor;}
  .fx.fire{width:26px;height:26px;border-radius:50% 50% 50% 0;background:radial-gradient(circle at 60% 40%,#ffe14a,#ff7a1f);transform:rotate(45deg);box-shadow:0 0 14px #ff7a1f;}
  .fx.rock{width:30px;height:28px;border-radius:7px;background:#8a6a3a;box-shadow:inset -5px -5px 0 rgba(0,0,0,.22);font-size:15px;}
  .fx.coin{width:22px;height:26px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#fff3a0,#ffc107 70%,#e08e00);border:2px solid #b8740a;font-size:13px;color:#b8740a;box-shadow:0 0 8px #ffd24a;}
  .fx.spark{width:10px;height:10px;border-radius:50%;transition:transform .42s ease-out,opacity .42s;}
  .fx.beam{height:11px;border-radius:6px;transition:width .25s ease-out,opacity .2s;box-shadow:0 0 14px currentColor;}
  .fx.lvring{width:60px;height:60px;border-radius:50%;background:transparent!important;border:5px solid #ffec3d;box-shadow:0 0 20px #ffec3d;transition:transform .5s ease-out,opacity .5s;}
  .fx.flash{position:absolute;inset:0;background:rgba(255,250,200,.55);transition:opacity .4s;z-index:24;}
  .fx.bigok{position:absolute;left:50%;top:40%;transform:translate(-50%,-50%) scale(.4);color:#ffec3d;font-size:62px;font-weight:900;opacity:0;transition:transform .3s,opacity .3s;text-shadow:0 3px 0 #c4281c,0 0 6px #000;z-index:30;-webkit-text-stroke:2px #7a0f0a;}
  .fx.bigx{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%) scale(.4);color:#e0224a;font-size:70px;font-weight:900;opacity:0;transition:transform .3s,opacity .3s;text-shadow:0 2px 0 #fff;z-index:30;}
  .bigtimer{position:absolute;top:6px;left:50%;transform:translateX(-50%);z-index:8;width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,.92);border:3px solid #c4281c;color:#c4281c;font-size:22px;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 10px rgba(0,0,0,.3);}
  .bigtimer.danger{animation:tpulse .5s infinite;}
  @keyframes tpulse{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.13)}}
  .quaking{animation:quakeA .42s;}
  @keyframes quakeA{0%,100%{transform:translate(0,0)}20%{transform:translate(-5px,2px)}40%{transform:translate(5px,-2px)}60%{transform:translate(-4px,1px)}80%{transform:translate(4px,-1px)}}
  .toast{position:absolute;top:13%;left:50%;background:#c0392b;color:#fff;font-weight:900;font-size:14px;padding:10px 18px;border-radius:12px;z-index:30;pointer-events:none;animation:tp 1.3s ease forwards;}
  @keyframes tp{0%{opacity:0;transform:translateX(-50%) scale(.7);}14%{opacity:1;transform:translateX(-50%) scale(1.04);}80%{opacity:1;}100%{opacity:0;}}
  .toast.good{background:#1f9a4c;}
  .combobanner{position:absolute;top:22%;left:50%;transform:translateX(-50%);z-index:31;pointer-events:none;font-size:30px;font-weight:900;color:#ffec3d;text-shadow:0 3px 0 #c4281c,0 0 8px #000;-webkit-text-stroke:1.5px #7a0f0a;animation:cb 1.1s ease forwards;}
  @keyframes cb{0%{opacity:0;transform:translateX(-50%) scale(.4) rotate(-8deg);}25%{opacity:1;transform:translateX(-50%) scale(1.15) rotate(4deg);}70%{opacity:1;transform:translateX(-50%) scale(1) rotate(0);}100%{opacity:0;transform:translateX(-50%) scale(1.1);}}
  /* overlay + start */
  .ov{position:absolute;inset:0;background:rgba(11,11,31,.96);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;z-index:40;overflow:auto;}
  .ov h1{font-size:27px;margin:6px 0;}.ov p{font-size:14px;max-width:680px;line-height:1.5;opacity:.95;}
  .ov .big{font-size:50px;}
  .startcard{background:#fff;border-radius:22px;padding:18px 24px;max-width:660px;color:#22303a;box-shadow:0 18px 50px rgba(0,0,0,.5);}
  .startcard .ttl{font-size:24px;font-weight:900;color:#c4281c;text-align:center;}
  .startcard .sub{font-size:13px;font-weight:800;color:#5f6b76;text-align:center;margin-top:2px;}
  .storyrow{display:flex;align-items:center;justify-content:center;gap:10px;margin:10px 0 6px;}
  .storyrow .say{font-size:14px;font-weight:900;color:#2a2a4a;background:#ffe7b0;border:2.5px solid #e0b86a;border-radius:13px;padding:8px 13px;max-width:360px;}
  .mvlist{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin:10px 0 4px;}
  .mvc{border-radius:10px;padding:7px 9px;color:#fff;font-weight:900;font-size:12px;text-align:left;line-height:1.1;}
  .mvc small{display:block;font-size:9.5px;font-weight:700;opacity:.95;}
  .ov button{margin-top:14px;background:#c4281c;color:#fff;border:none;border-radius:14px;padding:13px 38px;font-size:18px;font-weight:900;}
  .roles{font-size:12.5px;font-weight:800;color:#5f6b76;margin-top:8px;}
  .namebox{text-align:center;font-size:14px;font-weight:800;color:#3a2270;margin:8px 0 2px;}
  .namebox input{font-size:16px;font-weight:900;color:#2e1b5e;border:2px solid #cdbcef;border-radius:9px;padding:6px 10px;width:160px;text-align:center;text-transform:uppercase;}
</style>
</head>
<body>
<div id="app">
  <div class="statusbar">
    <div class="ttl"><button class="homebtn" onclick="goHome()">&#8962; Home</button>&#127812; Ratio Quest</div>
    <div><span class="pill">World <b id="foenum">1</b> / 10</span><span class="pill">&#129689; <b id="coins">0</b></span><button class="homebtn" id="musbtn" onclick="toggleMusic()" style="margin-right:0;margin-left:8px" title="Music on/off">&#128266;</button></div>
  </div>
  <div class="wrap" id="game"></div>
  <div class="ov" id="overlay"></div>
</div>
<script>
"use strict";
function $(id){return document.getElementById(id);}
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[rnd(0,a.length-1)];}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=rnd(0,i),t=a[i];a[i]=a[j];a[j]=t;}return a;}
function gcd(a,b){return b===0?a:gcd(b,a%b);}
function gcdArr(a){return a.reduce(function(x,y){return gcd(x,y);});}
function lcm(a,b){return a*b/gcd(a,b);}

/* ---------- sound (Web Audio, offline) ---------- */
var actx=null;
function eA(){try{if(!actx)actx=new (window.AudioContext||window.webkitAudioContext)();if(actx.state==='suspended')actx.resume();}catch(e){}}
function tone(freqs,type,step,dur,vol){eA();if(!actx)return;try{var t=actx.currentTime;freqs.forEach(function(f,i){var o=actx.createOscillator(),g=actx.createGain();o.type=type;o.frequency.value=f;o.connect(g);g.connect(actx.destination);var s=t+i*step;g.gain.setValueAtTime(0.0001,s);g.gain.exponentialRampToValueAtTime(vol,s+0.02);g.gain.exponentialRampToValueAtTime(0.0001,s+dur);o.start(s);o.stop(s+dur+0.02);});}catch(e){}}
function hitSnd(){tone([523,659,784,1047],'triangle',0.06,0.18,0.25);}

/* ---------- chiptune battle music (Web Audio, original loop) ---------- */
var musicGain=null;
var MUS={on:true,playing:false,timer:null,step:0,nextTime:0,track:'battle',nb:null};
var NIDX={C:0,'C#':1,D:2,'D#':3,E:4,F:5,'F#':6,G:7,'G#':8,A:9,'A#':10,B:11};
function n2m(name,oct){return (oct+1)*12+NIDX[name];}
function m2f(m){return 440*Math.pow(2,(m-69)/12);}
/* i - VI - VII - V (harmonic-minor) = classic "trainer battle" energy */
var CH_BATTLE=[{r:'A',oct:2,t:'min'},{r:'F',oct:2,t:'maj'},{r:'G',oct:2,t:'maj'},{r:'E',oct:2,t:'maj'}];
var CH_BOSS=[{r:'A',oct:2,t:'min'},{r:'C',oct:2,t:'maj'},{r:'D',oct:2,t:'min'},{r:'E',oct:2,t:'maj'}];
var LEADSEQ=[0,2,1,3,2,3,1,2],BASSSEQ=[0,1,2,1,0,1,2,1];
function ensureMusicGain(){if(!actx)return null;if(!musicGain){musicGain=actx.createGain();musicGain.gain.value=MUS.on?0.5:0;musicGain.connect(actx.destination);}return musicGain;}
function noiseBuf(){if(MUS.nb)return MUS.nb;var b=actx.createBuffer(1,Math.floor(actx.sampleRate*0.2),actx.sampleRate);var d=b.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=Math.random()*2-1;MUS.nb=b;return b;}
function mnote(freq,t,dur,type,vol){var o=actx.createOscillator(),g=actx.createGain();o.type=type;o.frequency.value=freq;o.connect(g);g.connect(musicGain);g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(vol,t+0.012);g.gain.exponentialRampToValueAtTime(0.0001,t+dur);o.start(t);o.stop(t+dur+0.02);}
function mkick(t){var o=actx.createOscillator(),g=actx.createGain();o.type='sine';o.frequency.setValueAtTime(140,t);o.frequency.exponentialRampToValueAtTime(45,t+0.12);o.connect(g);g.connect(musicGain);g.gain.setValueAtTime(0.0001,t);g.gain.exponentialRampToValueAtTime(0.5,t+0.01);g.gain.exponentialRampToValueAtTime(0.0001,t+0.16);o.start(t);o.stop(t+0.18);}
function msnare(t){var s=actx.createBufferSource();s.buffer=noiseBuf();var bp=actx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=1800;var g=actx.createGain();s.connect(bp);bp.connect(g);g.connect(musicGain);g.gain.setValueAtTime(0.16,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.12);s.start(t);s.stop(t+0.15);}
function mhat(t){var s=actx.createBufferSource();s.buffer=noiseBuf();var hp=actx.createBiquadFilter();hp.type='highpass';hp.frequency.value=7000;var g=actx.createGain();s.connect(hp);hp.connect(g);g.connect(musicGain);g.gain.setValueAtTime(0.07,t);g.gain.exponentialRampToValueAtTime(0.0001,t+0.05);s.start(t);s.stop(t+0.06);}
function chTones(ch){var br=n2m(ch.r,ch.oct),lr=n2m(ch.r,ch.oct+3),th=(ch.t==='min')?3:4;return {bass:[br,br+7,br+12],lead:[lr,lr+th,lr+7,lr+12]};}
function curBpm(){return (MUS.track==='boss')?174:150;}
function scheduleStep(gstep,t){
 var pat=(MUS.track==='boss')?CH_BOSS:CH_BATTLE,bars=pat.length,bar=Math.floor(gstep/16)%bars,s=gstep%16;
 var T=chTones(pat[bar]),sd=(60/curBpm())/4;
 if(s%2===0){var e=s/2;
   mnote(m2f(T.lead[LEADSEQ[e]]),t,sd*1.7,(MUS.track==='boss')?'sawtooth':'square',0.13);
   mnote(m2f(T.bass[BASSSEQ[e]]),t,sd*0.95,'triangle',0.22);}
 if(s===0||s===8)mkick(t);
 if(s===4||s===12)msnare(t);
 if(s%2===0)mhat(t);
}
function musicTick(){if(!MUS.playing||!actx)return;var sd=(60/curBpm())/4;while(MUS.nextTime<actx.currentTime+0.18){scheduleStep(MUS.step,MUS.nextTime);MUS.nextTime+=sd;MUS.step++;}}
function startMusic(){eA();if(!actx)return;ensureMusicGain();if(!musicGain)return;MUS.playing=true;MUS.step=0;MUS.nextTime=actx.currentTime+0.12;if(MUS.timer)clearInterval(MUS.timer);MUS.timer=setInterval(musicTick,40);}
function stopMusic(){MUS.playing=false;if(MUS.timer){clearInterval(MUS.timer);MUS.timer=null;}}
function toggleMusic(){MUS.on=!MUS.on;if(musicGain)musicGain.gain.value=MUS.on?0.5:0;if(MUS.on&&!MUS.playing&&S.foe)startMusic();var b=$('musbtn');if(b)b.innerHTML=MUS.on?'&#128266;':'&#128263;';}

function gtoast(m){var t=$('toast');if(t)t.remove();var d=document.createElement('div');d.className='toast good';d.id='toast';d.innerHTML=m;var a=$('app');if(a){a.appendChild(d);setTimeout(function(){if(d.parentNode)d.remove();},1300);}}

/* ---------- puzzle generation ---------- */
function genSimp(n){
 var i=S.ei,k= i<=1?pick([2,3,5]) : i<=3?pick([2,3,4,5,6]) : pick([4,6,9,12]);
 var base,t=0;do{base=[];for(var x=0;x<n;x++)base.push(rnd(1,6));var g=gcdArr(base);base=base.map(function(v){return v/g;});t++;}while(gcdArr(base)!==1&&t<30);
 while(Math.max.apply(null,base)*k>80&&k>2)k=Math.max(2,Math.floor(k/2));
 S.terms=base.map(function(v){return v*k;});
 S.baseHCF=gcdArr(S.terms);
 S.cols=["#2f7eb5","#e0556a","#5a8f2e"].slice(0,n);
 S.flavor=pick(n>=3?SIMP3_CTX:SIMP2_CTX);
}
function genEquiv(){
 var i=S.ei,a,b,t=0;do{a=rnd(1,6);b=rnd(1,6);var g=gcd(a,b);a=a/g;b=b/g;t++;}while((a===b||gcd(a,b)!==1)&&t<30);
 var m=(i<=2)?pick([2,3,4]):pick([3,4,5,6]);
 S.eqRatio=[a,b];S.eqWhich=rnd(0,1); // 0: ? on right side second term ; 1: ? on right first term... keep simple: show a:b = (a*m):? OR ?: (b*m)
 if(S.eqWhich===0){S.eqShown=[a,b,a*m,null];S.eqAnswer=b*m;}
 else {S.eqShown=[a,b,null,b*m];S.eqAnswer=a*m;}
 var opts=[S.eqAnswer],cand=shuffle([S.eqAnswer+m,S.eqAnswer-m,a*m+b*m,S.eqAnswer+1,S.eqAnswer*2,(S.eqWhich===0?a*m:b*m)]);
 for(var ci=0;ci<cand.length&&opts.length<4;ci++){if(cand[ci]>0&&opts.indexOf(cand[ci])<0)opts.push(cand[ci]);}
 var pad=S.eqAnswer+2;while(opts.length<4){if(opts.indexOf(pad)<0)opts.push(pad);pad++;}
 S.eqOpts=shuffle(opts);S.flavor=pick(EQUIV_CTX);S.cols=["#2f7eb5","#e0556a"];
}
function genScale(){
 var i=S.ei,a,b,t=0;do{a=rnd(2,5);b=rnd(2,6);var g=gcd(a,b);a=a/g;b=b/g;t++;}while((a<2||b<2||gcd(a,b)!==1)&&t<40);
 if(a<2||b<2){a=2;b=3;}
 var k=(i<=2)?pick([2,3]):pick([2,3,4]);
 S.scaleBase=[a,b];S.scaleCur=[a,b];S.scaleK=k;S.scaleCols=["#2f7eb5","#e0556a"];
 S.flavor=pick(SCALE_CTX);
}

function genFusion(){
 var hiQ=S.ei<=3?4:6,hiP=S.ei<=3?3:5,p,q,r,s,t=0;
 do{p=rnd(1,hiP);q=rnd(2,hiQ);r=rnd(2,hiQ);s=rnd(1,hiP);var g1=gcd(p,q);p=p/g1;q=q/g1;var g2=gcd(r,s);r=r/g2;s=s/g2;t++;}
 while((q<2||r<2||q===r||lcm(q,r)>20||p*(lcm(q,r)/q)>30||s*(lcm(q,r)/r)>30)&&t<90);
 S.c1=[p,q];S.c2=[r,s];S.c1b=[p,q];S.c2b=[r,s];S.shareT=lcm(q,r);
 S.lc=["#2f7eb5","#e0a81f","#5a8f2e"];S.ln=["A","B","C"];
 S.fstep="lcm";S.flavor=pick(FUSION_CTX);
 var L=S.shareT,opts=[L],cand=shuffle([q*r,q+r,L+q,L+r,q*2,r*2,L*2,L+2]);
 for(var ci=0;ci<cand.length&&opts.length<4;ci++){if(cand[ci]>0&&cand[ci]!==L&&opts.indexOf(cand[ci])<0)opts.push(cand[ci]);}
 var pad=L+1;while(opts.length<4){if(opts.indexOf(pad)<0)opts.push(pad);pad++;}
 S.lcmOpts=shuffle(opts);
}

/* ---------- choose / move ---------- */
function chooseMove(k){
 if(S.locked)return;blip();S.move=k;
 S.divSteps=0;S.wrongTries=0;S.fusErr=0;S.scaleSteps=0;
 if(k==="simp2"){genSimp(2);S.ui="puzzle";}
 else if(k==="simp3"){genSimp(3);S.ui="puzzle";}
 else if(k==="equiv"){genEquiv();S.ui="equiv";}
 else if(k==="scale"){genScale();S.ui="scale";}
 else if(k==="fusion"){genFusion();S.ui="puzzle";}
 else if(k==="guard"){genQuiz();S.ui="heal";}
 else if(k==="block"){S.blockProg=0;genQuiz();S.ui="block";}
 render();upRT();
}
function backMove(){if(S.locked)return;S.ui="choose";S.msg="Team, pick your move! &#128172;";render();}

/* ---------- simplify interactions ---------- */
function chips(arr,cols,sh){var h='';for(var i=0;i<arr.length;i++){var c=(sh&&sh.indexOf(i)>=0)?' sh':'';h+=(i?'<span class="colon">:</span>':'')+'<span class="chip'+c+'" style="background:'+cols[i%cols.length]+'">'+arr[i]+'</span>';}return h;}
function divideBy(f){if(S.locked)return;if(!S.terms.every(function(v){return v%f===0;})){missSnd();S.rt=Math.max(2,S.rt-5);S.wrongTries++;toast('&divide;'+f+' is NOT a common factor! (&minus;5s)');render();upRT();return;}S.terms=S.terms.map(function(v){return v/f;});S.divSteps++;blip();render();upRT();}

/* ---------- equivalent-ratio interactions ---------- */
function answerEquiv(v){if(S.locked)return;if(v===S.eqAnswer){blip();hit();}else{missSnd();S.rt=Math.max(2,S.rt-4);S.wrongTries++;toast('&#9888; Keep the ratio equal &mdash; try again! (&minus;4s)');render();upRT();}}

/* ---------- scale interactions ---------- */
function scaleBy(f){if(S.locked)return;var tgt=[S.scaleBase[0]*S.scaleK,S.scaleBase[1]*S.scaleK];
 var n=[S.scaleCur[0]*f,S.scaleCur[1]*f];
 if(n[0]>tgt[0]||n[1]>tgt[1]){missSnd();S.rt=Math.max(2,S.rt-4);toast('&#9888; Too big! Tap &#8634; to reset.');render();upRT();return;}
 S.scaleCur=n;S.scaleSteps++;blip();render();upRT();
 if(S.scaleCur[0]===tgt[0]&&S.scaleCur[1]===tgt[1]){setTimeout(function(){if(!S.locked)hit();},150);}
}
function scaleReset(){if(S.locked)return;S.scaleCur=S.scaleBase.slice();S.scaleSteps=0;render();upRT();}

/* ---------- fusion interactions ---------- */
function answerLCM(n){if(S.locked)return;if(n===S.shareT){blip();S.fstep="mult";render();upRT();setTimeout(function(){sparkEls('.chip.gsh','#ffd24a');},20);}else{missSnd();S.fusErr++;toast('&#9888; Not the LCM &mdash; try again!');}}
function multCardG(i,f){if(S.locked)return;var c=(i===1)?S.c1:S.c2;var bval=(i===1)?c[1]:c[0];
 if(bval*f===S.shareT){var n=[c[0]*f,c[1]*f];if(i===1)S.c1=n;else S.c2=n;blip();
   if(S.c1[1]===S.shareT&&S.c2[0]===S.shareT){S.fstep="combine";genCombineOpts();}
   render();upRT();setTimeout(function(){sparkEls('.chip.gsh','#7be0a0');},20);}
 else{missSnd();S.fusErr++;toast('&times;'+f+' won&#39;t make it '+S.shareT+'!');}
}
function genCombineOpts(){var L=S.shareT,A=S.c1[0],C=S.c2[1],correct=A+':'+L+':'+C,set=[correct];
 var cand=shuffle([C+':'+L+':'+A,A+':'+(L+1)+':'+C,S.c1b[0]+':'+L+':'+S.c2b[1],A+':'+L+':'+(C+1),(A+1)+':'+L+':'+C,A+':'+C+':'+L]);
 for(var i=0;i<cand.length&&set.length<4;i++){if(set.indexOf(cand[i])<0)set.push(cand[i]);}
 S.combineOpts=shuffle(set);S.combineAns=correct;}
function answerCombine(o){if(S.locked)return;if(o===S.combineAns){hit();}else{missSnd();S.fusErr++;toast('&#9888; Read the combined ratio again!');}}

/* ---------- quiz (heal / block) ---------- */
function answerQuiz(opt){if(S.locked)return;S.healOnly=false;
 if(opt===S.quiz.a){var h=Math.min(Math.round(S.pmax*0.25),S.pmax-S.php);S.locked=true;powerSnd();S.php+=h;floatDmg('.me',h,true);S.msg=S.heroName+" answered right &mdash; +"+h+" HP!";render();setTimeout(function(){startTurn();},1100);}
 else{S.locked=true;missSnd();S.combo=0;S.msg="Wrong answer &mdash; no heal!";render();setTimeout(function(){enemyTurn(false);},700);}}
function answerBlock(opt){if(S.locked)return;
 if(opt===S.quiz.a){S.blockProg++;blip();okFx(S.blockProg>=3);
   if(S.blockProg>=3){S.blocked=true;S.locked=true;S.msg="&#128737;&#9989; 3/3! Shell ready &mdash; counter incoming!";render();setTimeout(function(){enemyTurn(false);},1000);}
   else{S.msg="&#9989; Correct! "+S.blockProg+"/3 &mdash; keep going!";genQuiz();render();upRT();}
 } else {S.blocked=false;S.locked=true;missSnd();errFx();S.msg="&#10006; WRONG! Block broken &mdash; here it comes...";render();setTimeout(function(){enemyTurn(false);},1200);}}

/* ---------- resolve attack ---------- */
function attack(){if(S.locked)return;var ok=false;
 if(S.move==="simp2"||S.move==="simp3"){ok=(gcdArr(S.terms)===1);}
 else if(S.move==="fusion"){ok=(S.c1[1]===S.c2[0]);}
 if(ok){hit();}else{if(S.move==="fusion")toast('&#9888; Make B match first!');else toast('&#9888; Not simplest yet!');missSnd();miss();}}

/* ---------- items ---------- */
function dropItem(boss){var pool=boss?["mushroom","star","oneup","clock","hint"]:["mushroom","clock","hint","star"];
 var k=pick(pool);S.items[k]=(S.items[k]||0)+1;return k;}
function useItem(k){
 if(!S.items[k]||S.items[k]<=0)return;
 if(S.locked){toast('Wait for your turn!');return;}
 if(k==="mushroom"){var h=Math.min(Math.round(S.pmax*0.4),S.pmax-S.php);if(h<=0){toast('HP already full!');return;}S.items[k]--;S.php+=h;powerSnd();floatDmg('.me',h,true);gtoast('&#127812; +'+h+' HP!');render();}
 else if(k==="clock"){S.items[k]--;S.rt+=15;coinSnd();gtoast('&#9200; +15 seconds!');render();upRT();}
 else if(k==="star"){S.items[k]--;S.starNext=true;S.starInvuln=true;starSnd();gtoast('&#11088; STAR! Next hit is SUPER &amp; you block one attack!');render();}
 else if(k==="hint"){S.items[k]--;blip();
   if(S.ui==="puzzle"&&(S.move==="simp2"||S.move==="simp3"))gtoast('&#128161; HCF = '+gcdArr(S.terms)+' &mdash; divide by it once!');
   else if(S.ui==="scale")gtoast('&#128161; Tap &times;'+S.scaleK+' once!');
   else if(S.ui==="equiv")gtoast('&#128161; The missing amount is '+S.eqAnswer+'.');
   else if(S.ui==="puzzle"&&S.move==="fusion")gtoast('&#128161; LCM of '+S.c1b[1]+' &amp; '+S.c2b[0]+' = '+S.shareT+'.');
   else if(S.ui==="heal"||S.ui==="block")gtoast('&#128161; Answer: '+S.quiz.a);
   else gtoast('&#128161; Pick a strong move, then I&#39;ll help!');
   render();}
 else if(k==="oneup"){toast('1-Up saves you automatically when you faint!');}
}

/* ---------- fx library ---------- */
function ctr(sel){var el=document.querySelector(sel+' .mon');if(!el)return null;var a=$('app').getBoundingClientRect(),r=el.getBoundingClientRect();return {x:r.left-a.left+r.width/2,y:r.top-a.top+r.height/2,el:el};}
function mkfx(cls,col,txt){var d=document.createElement('div');d.className='fx '+cls;if(col)d.style.background=col;if(txt!=null)d.innerHTML=txt;$('app').appendChild(d);return d;}
function flyOne(el,sx,sy,ex,ey,arc,dur,delay){el.style.left=sx+'px';el.style.top=sy+'px';
 if(arc){var mx=(sx+ex)/2,my=Math.min(sy,ey)-80;
  setTimeout(function(){el.style.transition='transform '+(dur/2)+'ms ease-out';el.style.transform='translate('+(mx-sx)+'px,'+(my-sy)+'px) rotate(180deg)';},delay+10);
  setTimeout(function(){el.style.transition='transform '+(dur/2)+'ms ease-in';el.style.transform='translate('+(ex-sx)+'px,'+(ey-sy)+'px) rotate(360deg) scale(.7)';},delay+10+dur/2);
 } else { setTimeout(function(){el.style.transition='transform '+dur+'ms cubic-bezier(.4,.1,.5,1)';el.style.transform='translate('+(ex-sx)+'px,'+(ey-sy)+'px) scale(.7)';},delay+10); }
 setTimeout(function(){el.remove();},delay+dur+120);}
function burst(x,y,col){for(var i=0;i<9;i++){(function(a){var p=mkfx('spark',col,null);p.style.left=x+'px';p.style.top=y+'px';var dx=Math.cos(a)*32,dy=Math.sin(a)*32;setTimeout(function(){p.style.transform='translate('+dx+'px,'+dy+'px) scale(.2)';p.style.opacity='0';},10);setTimeout(function(){p.remove();},440);})(i/9*6.283);}}
function coinPop(x,y){for(var i=0;i<5;i++){(function(j){var c=mkfx('coin',null,'&#36;');c.style.left=x+'px';c.style.top=y+'px';var dx=(j-2)*16;setTimeout(function(){c.style.transition='transform .6s cubic-bezier(.3,-0.4,.6,1),opacity .6s';c.style.transform='translate('+dx+'px,-54px)';c.style.opacity='0';},10);setTimeout(function(){c.remove();},640);})(i);}coinSnd();}
function beam(sx,sy,ex,ey,col){var len=Math.hypot(ex-sx,ey-sy),ang=Math.atan2(ey-sy,ex-sx)*180/Math.PI;var b=mkfx('beam',col,null);b.style.color=col;b.style.left=sx+'px';b.style.top=(sy-6)+'px';b.style.width='0px';b.style.transformOrigin='0 50%';b.style.transform='rotate('+ang+'deg)';setTimeout(function(){b.style.width=len+'px';},10);setTimeout(function(){b.style.opacity='0';},360);setTimeout(function(){b.remove();},540);}
function dropOn(x,y,col,txt){var d=mkfx('rock',col,txt);d.style.left=(x-15)+'px';d.style.top=(y-170)+'px';setTimeout(function(){d.style.transition='transform .34s cubic-bezier(.6,0,.9,1)';d.style.transform='translateY(150px)';},10);setTimeout(function(){d.remove();},520);}
function quake(){var g=$('game');if(g){g.classList.add('quaking');setTimeout(function(){g.classList.remove('quaking');},420);}}
function okFx(big){var c=ctr('.me');if(c){burst(c.x,c.y-6,'#1f9a4c');if(big)burst(c.x,c.y-6,'#ffec3d');}
 var fl=mkfx('flash',null,null);fl.style.background='rgba(31,154,76,.26)';setTimeout(function(){fl.style.opacity='0';},20);setTimeout(function(){fl.remove();},340);
 var v=mkfx('bigok',null,'&#10003;');setTimeout(function(){v.style.transform='translate(-50%,-50%) scale(1)';v.style.opacity='1';},10);setTimeout(function(){v.style.opacity='0';},520);setTimeout(function(){v.remove();},720);}
function errFx(){var fl=mkfx('flash',null,null);fl.style.background='rgba(224,34,74,.42)';setTimeout(function(){fl.style.opacity='0';},20);setTimeout(function(){fl.remove();},420);
 var x=mkfx('bigx',null,'&#10006;');setTimeout(function(){x.style.transform='translate(-50%,-50%) scale(1) rotate(-8deg)';x.style.opacity='1';},10);setTimeout(function(){x.style.opacity='0';},650);setTimeout(function(){x.remove();},850);
 var me=ctr('.me');if(me&&me.el)me.el.classList.add('hit');}
function superFx(){var v=mkfx('bigok',null,'SUPER!');v.style.fontSize='46px';setTimeout(function(){v.style.transform='translate(-50%,-50%) scale(1) rotate(-6deg)';v.style.opacity='1';},10);setTimeout(function(){v.style.opacity='0';},700);setTimeout(function(){v.remove();},900);
 var t=ctr('.foe');if(t){burst(t.x,t.y,'#ffec3d');burst(t.x,t.y,'#3cc0ff');}critSnd();}
function levelUpFx(){var c=ctr('.me');lvlSnd();var fl=mkfx('flash',null,null);setTimeout(function(){fl.style.opacity='0';},20);setTimeout(function(){fl.remove();},420);if(!c)return;
 var ring=mkfx('lvring',null,null);ring.style.left=c.x+'px';ring.style.top=c.y+'px';ring.style.transform='translate(-50%,-50%) scale(.4)';setTimeout(function(){ring.style.transform='translate(-50%,-50%) scale(2.6)';ring.style.opacity='0';},10);setTimeout(function(){ring.remove();},560);}
function floatDmg(sel,n,heal){var p=document.querySelector(sel);if(!p)return;var d=document.createElement('div');d.className='dmg'+(heal?' heal':'');d.textContent=(heal?'+':'-')+n;var r=p.getBoundingClientRect(),a=$('app').getBoundingClientRect();d.style.left=(r.left-a.left+r.width/2)+'px';d.style.top=(r.top-a.top+10)+'px';$('app').appendChild(d);setTimeout(function(){d.remove();},1000);}

function doMoveFx(move,nums,cb){var f=ctr('.me'),t=ctr('.foe');if(!f||!t){cb();return;}
 if(move==="fusion"){beam(f.x,f.y,t.x,t.y,'#ff3b6b');beam(f.x,f.y-4,t.x,t.y-4,'#ffec3d');
   nums.forEach(function(n,i){setTimeout(function(){var e=mkfx('fire',null,'');flyOne(e,f.x,f.y,t.x,t.y,false,240,0);},i*55);});
   setTimeout(function(){burst(t.x,t.y,'#ff3b6b');burst(t.x,t.y,'#ffec3d');},300);setTimeout(cb,520);
 } else if(move==="scale"){
   nums.forEach(function(n,i){var e=mkfx('coin',null,n);flyOne(e,f.x,f.y,t.x,t.y,true,520,i*80);});
   var total=(nums.length-1)*80+520;setTimeout(function(){burst(t.x,t.y,'#ffd24a');quake();},total);setTimeout(cb,total+110);
 } else {
   var arc=(move==="simp3"),dur=arc?560:470,col=arc?'#8a5cd0':'#2f7eb5',shape=arc?'bomb':'ball';
   nums.forEach(function(n,i){var e=mkfx(shape,col,n);flyOne(e,f.x,f.y,t.x,t.y,arc,dur,i*95);});
   var tt=(nums.length-1)*95+dur;setTimeout(function(){burst(t.x,t.y,col);if(arc){burst(t.x,t.y,'#ff9f1c');quake();}},tt);setTimeout(cb,tt+110);
 }}
function doFoeFx(cb){var f=ctr('.foe'),t=ctr('.me');if(!f||!t){cb();return;}var ty=S.foe.ele,end=cb;
 if(ty==="GRASS"){for(var i=0;i<5;i++){var e=mkfx('orb','#5aa64a',null);flyOne(e,f.x,f.y,t.x,t.y+(i-2)*10,false,460,i*55);}setTimeout(function(){burst(t.x,t.y,'#2e9e5b');},540);setTimeout(end,650);}
 else if(ty==="FIRE"){var e=mkfx('fire',null,null);flyOne(e,f.x,f.y,t.x,t.y,false,500,0);setTimeout(function(){burst(t.x,t.y,'#ff7a1f');burst(t.x,t.y,'#ffec3d');},520);setTimeout(end,660);}
 else if(ty==="SPARK"){beam(f.x,f.y,t.x,t.y,'#ffec3d');setTimeout(function(){beam(f.x,f.y,t.x,t.y,'#ffffff');burst(t.x,t.y,'#ffec3d');},120);setTimeout(end,480);}
 else if(ty==="DARK"){for(var i=0;i<5;i++){var e=mkfx('orb','#6a4fb0',null);flyOne(e,f.x,f.y,t.x,t.y,(i%2===0),500,i*60);}setTimeout(function(){burst(t.x,t.y,'#6a4fb0');},560);setTimeout(end,710);}
 else if(ty==="EARTH"){dropOn(t.x,t.y,'#8a6a3a','&#129704;');setTimeout(function(){burst(t.x,t.y,'#a07a4a');quake();},360);setTimeout(end,640);}
 else {beam(f.x,f.y,t.x,t.y,'#ff3b6b');for(var i=0;i<6;i++){var e=mkfx('fire',null,null);flyOne(e,f.x,f.y,t.x+(i-3)*10,t.y,false,520,i*55);}setTimeout(function(){burst(t.x,t.y,'#ff3b6b');burst(t.x,t.y,'#ffec3d');quake();},560);setTimeout(end,740);}
}

/* ---------- hit (combo + crit) ---------- */
function hit(){
 if(S.foe.boss && S.shielded && S.move===S.foe.weak){S.locked=true;splitFx();hitSnd();S.minions=null;S.shielded=false;S.msg="&#128165; "+MV[S.foe.weak].name+" splashes the minions &mdash; SHIELD SHATTERED!";render();setTimeout(function(){enemyTurn(false);},1000);return;}
 S.locked=true;
 var crit=false;
 if(S.starNext){crit=true;S.starNext=false;}
 if(S.move==="simp2"||S.move==="simp3"){if(S.divSteps===1&&S.baseHCF>1)crit=true;}
 else if(S.move==="equiv"){if(S.wrongTries===0)crit=true;}
 else if(S.move==="scale"){if(S.scaleSteps===1)crit=true;}
 else if(S.move==="fusion"){if(S.fusErr===0)crit=true;}
 S.combo++;
 var comboMult=1+Math.min(S.combo-1,4)*0.25;
 var nums=(S.move==="fusion")?[S.c1[0],S.c1[1],S.c2[1]]
         :(S.move==="equiv")?[S.eqShown[0],S.eqShown[1]]
         :(S.move==="scale")?[S.scaleCur[0],S.scaleCur[1]]:S.terms.slice();
 var base=MV[S.move].pow,adapted=false;
 if(!S.foe.req && S.move===S.lastMove){base=Math.round(base*0.5);adapted=true;}
 var ti=typeInfo(S.move);
 var dmg=Math.max(1,Math.round((base+Math.round(S.rt*0.3)+(S.lv-1)*2)*comboMult*(crit?2:1)*ti.mult));
 var cap=Math.ceil(S.foe.max*(S.foe.boss?0.16:0.5));if(dmg>cap)dmg=cap; // no one-shots; bosses survive their phases
 S.lastMove=S.move;
 var label=(crit?"&#11088; SUPER ":"")+S.heroName+" used <b>"+MV[S.move].name+"</b>!"+(S.combo>=2?" &#128293;Combo &#215;"+S.combo:"");
 S.msg=label;render();
 doMoveFx(S.move,nums,function(){
   hitSnd();if(crit)superFx();if(S.combo>=2)comboBanner(S.combo);
   if(ti.tag==='super')gtoast('&#128293; Super effective!');else if(ti.tag==='resist')toast('&#128737; Not very effective...');
   S.foe.hp=Math.max(0,S.foe.hp-dmg);var fe=ctr('.foe');if(fe&&fe.el)fe.el.classList.add('hit');floatDmg('.foe',dmg,false);
   gainXP(6+(S.move==="simp2"?4:S.move==="simp3"?7:S.move==="fusion"?12:S.move==="scale"?6:5));
   S.msg=S.heroName+" hits &minus;"+dmg+(ti.tag==='super'?" &#128293;super!":ti.tag==='resist'?" (resisted)":"")+(crit?" &#11088;SUPER!":"")+(adapted?" (adapted!)":"")+"!";render();
   setTimeout(function(){ if(S.foe.hp<=0)foeFaint(); else enemyTurn(false); },650);
 });
}
function miss(){S.locked=true;S.combo=0;S.msg="The attack fizzled out!";render();setTimeout(function(){enemyTurn(true);},600);}
function onTimeout(){S.locked=true;S.combo=0;missSnd();S.msg="&#9201; Time up &mdash; no attack!";render();setTimeout(function(){enemyTurn(true);},600);}

/* ---------- enemy turn ---------- */
function takeDmg(d){if(S.starInvuln){S.starInvuln=false;gtoast('&#11088; Invincible! No damage!');return 0;}return d;}
function enemyTurn(big){
 if(S.foe.boss){bossTurn(big);return;}
 S.msg=(S.msg?S.msg+" ":"")+"<b>"+S.foe.n+"</b> attacks!";render();
 doFoeFx(function(){
   var d=takeDmg(big?Math.round(S.foe.atk*1.4):S.foe.atk);
   if(d>0){S.php=Math.max(0,S.php-d);var me=ctr('.me');if(me&&me.el)me.el.classList.add('hit');floatDmg('.me',d,false);S.msg="<b>"+S.foe.n+"</b> hits &minus;"+d+"!";}else{S.msg="<b>"+S.foe.n+"</b> attacks &mdash; blocked!";}
   render();setTimeout(function(){ if(S.php<=0)lose(); else {S.msg="";startTurn();} },900);
 });
}
function applyFoeDmg(d){d=takeDmg(d);if(d>0){S.php=Math.max(0,S.php-d);var me=ctr('.me');if(me&&me.el)me.el.classList.add('hit');floatDmg('.me',d,false);S.msg+=" &minus;"+d+"!";}render();setTimeout(function(){ if(S.php<=0)lose(); else {S.msg="";startTurn();} },950);}
function bossSlam(blocked,cb){var el=document.querySelector('.foe .mon'),f=ctr('.foe'),h=ctr('.me');if(!el||!f||!h){cb&&cb();return;}
 var dx=h.x-f.x,dy=h.y-f.y;el.style.transition='transform .25s ease-out';el.style.transform='translateY(-54px) scale(1.06)';
 setTimeout(function(){el.style.transition='transform .22s cubic-bezier(.6,0,.95,1)';el.style.transform='translate('+(dx*0.6)+'px,'+(dy*0.6)+'px) scale(1.14)';},280);
 if(blocked){setTimeout(function(){burst(h.x,h.y-8,'#ffec3d');burst(h.x,h.y-8,'#bcd6ff');el.style.transition='transform .42s cubic-bezier(.2,.85,.3,1)';el.style.transform='translateY(-30px) rotate(360deg) scale(.95)';},520);
   setTimeout(function(){el.style.transition='transform .2s';el.style.transform='';},940);setTimeout(function(){cb&&cb();},1000);
 } else {setTimeout(function(){burst(h.x,h.y,'#ff3b6b');burst(h.x,h.y,'#ffec3d');quake();el.style.transition='transform .25s ease-out';el.style.transform='';},520);setTimeout(function(){cb&&cb();},800);}}
function bossTurn(){
 if(S.stunned){S.stunned=false;S.msg="<b>"+S.foe.n+"</b> is dizzy &#128171; &mdash; it loses its turn!";render();setTimeout(function(){S.msg="";startTurn();},1300);return;}
 if(S.charging){S.charging=false;var big=Math.round(S.foe.atk*2.5);
   if(S.blocked){S.blocked=false;var refl=Math.round(big*0.7);S.msg="&#128737; "+S.heroName+" BLOCKS the slam!";render();
     bossSlam(true,function(){S.foe.hp=Math.max(0,S.foe.hp-refl);S.stunned=true;var t=ctr('.foe');if(t&&t.el)t.el.classList.add('hit');floatDmg('.foe',refl,false);
       S.msg="&#128737;&#128293; Repelled! Reflected &minus;"+refl+" &mdash; <b>"+S.foe.n+"</b> is STUNNED!";render();
       setTimeout(function(){ if(S.foe.hp<=0)foeFaint(); else {S.msg="";startTurn();} },1150);});return;}
   S.msg="&#128165; <b>"+S.foe.n+"</b> leaps high &mdash; BODY SLAM!";render();bossSlam(false,function(){applyFoeDmg(big);});return;}
 if(S.shielded){S.msg="<b>"+S.foe.n+"</b> strikes from behind its shield!";render();doFoeFx(function(){applyFoeDmg(S.foe.atk);});return;}
 var pct=S.foe.hp/S.foe.max;
 if(pct<=0.66 && !S.usedShield){S.usedShield=true;S.minions=[1,1];S.shielded=true;S.msg="&#9876;&#65039; PHASE 2 &mdash; <b>"+S.foe.n+"</b> raises a SHIELD WALL with 2 minions! Break it with <b>"+MV[S.foe.weak].name+"</b>!";render();setTimeout(function(){S.msg="";startTurn();},1500);return;}
 if(pct<=0.33 && !S.usedEnrage){S.usedEnrage=true;S.charging=true;S.msg="&#128293; LAST STAND! <b>"+S.foe.n+"</b> charges a MASSIVE slam &mdash; <b>SHELL BLOCK</b> 3 in a row to survive!";render();setTimeout(function(){S.msg="";startTurn();},1500);return;}
 S.msg="<b>"+S.foe.n+"</b> attacks!";render();doFoeFx(function(){applyFoeDmg(S.foe.atk);});}
function splitFx(){var f=ctr('.me');if(!f)return;var a=$('app').getBoundingClientRect();var ms=document.querySelectorAll('.minion .mon');
 if(ms.length){ms.forEach(function(m){var r=m.getBoundingClientRect();var ex=r.left-a.left+r.width/2,ey=r.top-a.top+r.height/2;beam(f.x,f.y,ex,ey,'#ff3b6b');setTimeout(function(){burst(ex,ey,'#ff3b6b');burst(ex,ey,'#ffec3d');},260);});}
 else{var b=ctr('.foe');if(b){beam(f.x,f.y,b.x-40,b.y,'#ff3b6b');beam(f.x,f.y,b.x+40,b.y,'#ff3b6b');setTimeout(function(){burst(b.x,b.y,'#ff3b6b');},260);}}}

/* ---------- faint / drops / progression ---------- */
function gainXP(n){S.xp+=n;while(S.xp>=S.xpNext){S.xp-=S.xpNext;S.lv++;S.pmax+=10;S.php=S.pmax;S.xpNext=Math.round(S.xpNext*1.25);
  var un=S.lv===2?" &#128081; Grow Blast & Triple Stomp unlocked!":S.lv===3?" &#128081; Fire Combo unlocked!":"";
  levelUpFx();gtoast('&#11088; LEVEL UP! Lv.'+S.lv+un);}}
function foeFaint(){
 S.locked=true;gainXP(20+S.ei*5);S.coins+=10+S.ei*2;var ce=ctr('.foe');if(ce)coinPop(ce.x,ce.y);
 S.msg="<b>"+S.foe.n+"</b>: "+S.foe.lines.ko+" &#11088;";render();
 var wasBoss=S.foe.boss;
 setTimeout(function(){
   if(S.ei>=ENEMIES.length-1){win();return;}
   // drops
   var got=[];var nd=wasBoss?2:(Math.random()<0.45?1:0);
   for(var i=0;i<nd;i++)got.push(dropItem(wasBoss));
   if(got.length){powerSnd();var names=got.map(function(k){return ITEM_NAME[k];});gtoast('&#127873; Got: '+names.join(' + '));}
   if(!wasBoss)stageSnd();
   S.ei++;S.lastMove=null;spawnFoe();
   var wk=S.foe.weak?(" &#127919; Weak to "+MV[S.foe.weak].name+"!"):"";
   S.msg="&#127937; World "+(S.ei+1)+"! <b>"+S.foe.n+"</b>: "+S.foe.lines.in+wk;render();setTimeout(function(){startTurn();},1500);
 },1300);
}
function lose(){
 if(S.items.oneup>0){S.items.oneup--;S.php=Math.round(S.pmax*0.5);oneupSnd();gtoast('&#127807; 1-UP! You sprang back to life!');render();setTimeout(function(){S.msg="";startTurn();},1300);return;}
 if(S.timer)clearInterval(S.timer);stopMusic();$('overlay').classList.remove('hide');
 $('overlay').innerHTML='<div class="big">&#128128;&#127812;</div><h1>'+(S.heroName||'MARI')+' fainted!</h1><p>You reached World '+(S.ei+1)+' / '+ENEMIES.length+'. The Princess is still captured &mdash; train your ratios and try again!</p><button onclick="startGame()">Try again</button><button onclick="goHome()" style="background:#3a2a66">Home</button>';}
function win(){if(S.timer)clearInterval(S.timer);stopMusic();$('overlay').classList.remove('hide');
 $('overlay').innerHTML='<div class="big">&#127942;&#128081;</div><h1>You saved the Princess!</h1>'
  +'<div style="display:flex;align-items:center;justify-content:center;gap:10px;margin:8px 0">'+monSVG(heroPlumber,'','',92)+'<span style="font-size:30px">&#128149;</span>'+princess(92)+'</div>'
  +'<p>Bwa ha ha is no more! '+(S.heroName||'MARI')+' beat all '+ENEMIES.length+' worlds with smart ratios and rescued the Princess. &#129689; Coins: '+S.coins+'</p>'
  +'<button onclick="goHome()">Home</button></div>';}

/* ---------- render ---------- */
function worldBg(){var b=S.ei;
 if(b<=2)return 'linear-gradient(180deg,#5c94fc 0%,#7fb0ff 55%,#aee0ff 72%,#7ec850 72%)';
 if(b<=4)return 'linear-gradient(180deg,#0b0b2a,#16163e 60%,#2a2440)';
 if(b<=8)return 'linear-gradient(180deg,#2a1730,#4a2238 55%,#7a2a1a)';
 return 'linear-gradient(180deg,#1a0606,#4a0a0a 55%,#7a1410)';}
function hpbar(hp,max,col){var p=Math.max(0,hp/max*100);var c=p<=25?'#e0556a':p<=50?'#f0a93c':col;return '<div class="hpwrap"><span class="hpl">HP</span><div class="hpbar"><i style="width:'+p+'%;background:'+c+'"></i></div></div><div class="hpnum">'+hp+' / '+max+'</div>';}
function moveBtn(k,cls){
 var forced=S.allow && S.allow.indexOf(k)>=0;
 var lvlok=moveUnlocked(k);
 var isReq=(S.foe.req===k);
 var shieldBlock=S.foe.req && k!==S.foe.req && k!=="guard";
 var ok=forced||((lvlok||isReq)&&!shieldBlock);
 var tag=shieldBlock?" &#128737;":((!lvlok&&!isReq)?" &#128274;":"");
 var isWeak=(S.foe.weak===k && ok);
 var sup=isWeak?'<span class="supbadge">&#127919;&#215;1.6</span>':'';
 return '<button class="mv '+cls+(isWeak?' weakmv':'')+'"'+(ok?'':' disabled')+' onclick="chooseMove(\''+k+'\')">'+sup+MV[k].name+tag+'<small>'+MV_SUB[k]+'</small></button>';}
function invBar(){var h='';['mushroom','star','oneup','clock','hint'].forEach(function(k){var n=S.items[k]||0;h+='<button class="invslot'+(n>0?'':' empty')+'" onclick="useItem(\''+k+'\')" title="'+ITEM_NAME[k]+'">'+ITEM_ICON[k]+'<span class="invn">'+n+'</span></button>';});return '<div class="inv">'+h+'</div>';}
function bgDecor(){var b=S.ei;var h='';
 if(b<=2){h+='<div class="cloudbg" style="left:14%;top:12%;width:70px;height:26px"></div><div class="cloudbg" style="left:60%;top:22%;width:90px;height:30px"></div>';
   h+='<div class="hill" style="left:18%;width:120px;height:60px"></div><div class="hill" style="left:64%;width:150px;height:80px"></div>';}
 else if(b<=4){h+='<div class="brickrow" style="top:0;height:18px;background:repeating-linear-gradient(90deg,#5a3a2a 0 22px,#3a2418 22px 24px)"></div>';}
 return h;}
function render(){
 var f=S.foe;
 var shieldBadge=f.weak?'<div class="weaktag">&#127919; WEAK TO: <b>'+MV[f.weak].name+'</b> &#215;1.6'+(f.resist?'<span class="res"> &middot; &#128737; '+MV[f.resist].name+' &#189;</span>':'')+'</div>':'';
 var minHTML=S.minions?'<div class="minions"><span class="minion">'+monSVG(sGoomba,'#caa9ec','#6a4fb0',50)+'</span><span class="shieldlbl">&#128737; SHIELD</span><span class="minion">'+monSVG(sGoomba,'#caa9ec','#6a4fb0',50)+'</span></div>':'';
 var sz=f.boss?128:112;
 var bsv=monSVG(f.draw,f.c,f.d,sz);if(S.charging)bsv=bsv.replace('class="mon"','class="mon charging"');if(S.shielded)bsv=bsv.replace('class="mon"','class="mon shielded"');
 var stunHTML=S.stunned?'<div class="stunfx">&#128171;&#11088;&#128171;</div>':'';
 var foeHTML='<div class="foe"><div class="nameTag">'+f.n+' <span class="lv">Lv.'+(S.ei+3)+'</span> <span class="type" style="background:'+f.tc+'">'+f.t+'</span></div>'+hpbar(f.hp,f.max,f.d)+shieldBadge+minHTML+'<div style="position:relative;display:inline-block'+(S.stunned?'" class="stunwrap':'')+'">'+stunHTML+bsv+'</div></div>';
 var cageHTML=(S.ei===ENEMIES.length-1)?'<div class="cage"><div class="cagelbl">&#128557; Princess!</div><div class="cagebars">'+princess(60)+'</div></div>':'';
 var meCls=S.starInvuln?'mon starman':'mon';
 var heroSvg=monSVG(heroPlumber,'','',112).replace('class="mon"','class="'+meCls+'"');
 var xpbar='<div class="xpwrap"><span class="xpl">XP</span><div class="xpbar"><i style="width:'+Math.round(S.xp/S.xpNext*100)+'%"></i></div></div>';
 var meHTML='<div class="me">'+heroSvg+'<div class="nameTag" style="margin-top:1px">'+S.heroName+' <span class="lv">Lv.'+S.lv+'</span> <span class="type" style="background:#2e9e5b">HERO</span></div>'+hpbar(S.php,S.pmax,'#2e9e5b')+xpbar+'</div>';
 var bottom;
 if(S.ui==="choose"){
   var mv;
   if(S.allow){
     if(S.allow[0]==="block") mv='<button class="mv mblock" onclick="chooseMove(\'block\')">&#128737; SHELL BLOCK!<small>連續答啱 3 題抵擋重擊</small></button>';
     else if(S.allow[0]==="guard") mv='<div class="forcemsg">&#128683; Only this turn &rarr;</div>'+moveBtn("guard","m6");
     else mv='<div class="forcemsg">&#128737; Break the shield with '+MV[S.allow[0]].name+' &rarr;</div>'+moveBtn(S.allow[0],MV_CLS[S.allow[0]]||"m5");
   } else { mv=MV_ORDER.map(function(k){return moveBtn(k,MV_CLS[k]);}).join(""); }
   bottom='<div class="msg" id="msg">'+S.msg+'</div><div class="moves'+(S.allow?' one':'')+'">'+mv+'</div>';
 } else if(S.ui==="block"){
   var bopts=S.quizOpts.map(function(o){return '<button class="qopt" onclick="answerBlock(\''+o+'\')">'+fmtMath(o)+'</button>';}).join('');
   bottom='<div class="puz"><div class="ph"><span>&#128737; SHELL BLOCK &mdash; '+S.blockProg+' / 3 correct</span><span class="rt" id="rt">0:'+(S.rt<10?"0":"")+S.rt+'</span></div>'+
     '<div class="quizq">'+fmtMath(S.quiz.q)+'</div><div class="qopts">'+bopts+'</div>'+
     '<div class="prow"><span class="hint">3 in a row &rarr; block AND reflect <b>70%</b> back!</span></div></div>';
 } else if(S.ui==="heal"){
   var opts=S.quizOpts.map(function(o){return '<button class="qopt" onclick="answerQuiz(\''+o+'\')">'+fmtMath(o)+'</button>';}).join('');
   bottom='<div class="puz"><div class="ph"><span>&#127812; Mushroom Guard &mdash; answer to heal!</span><span class="rt" id="rt">0:'+(S.rt<10?"0":"")+S.rt+'</span></div>'+
     '<div class="quizq">'+fmtMath(S.quiz.q)+'</div><div class="qopts">'+opts+'</div>'+
     '<div class="prow"><button class="back" onclick="backMove()">&#8617; Move</button><span class="hint">Correct &rarr; recover &frac14; HP</span></div></div>';
 } else if(S.ui==="equiv"){
   var a=S.eqShown[0],b=S.eqShown[1],c=S.eqShown[2],d=S.eqShown[3];
   var box=function(v,col){return v===null?'<span class="chip" style="background:#bbb">?</span>':'<span class="chip" style="background:'+col+'">'+v+'</span>';};
   var eq='<div class="ratio">'+box(a,S.cols[0])+'<span class="colon">:</span>'+box(b,S.cols[1])+'<span class="colon" style="color:#3a2270">=</span>'+box(c,S.cols[0])+'<span class="colon">:</span>'+box(d,S.cols[1])+'</div>';
   var eopts=S.eqOpts.map(function(v){return '<button class="qopt" onclick="answerEquiv('+v+')">'+v+'</button>';}).join('');
   bottom='<div class="puz"><div class="ph"><span>'+MV.equiv.name+'</span><span class="rt" id="rt">0:'+(S.rt<10?"0":"")+S.rt+'</span></div>'+
     '<div class="hint" style="margin-bottom:2px">'+(S.flavor||'')+'</div>'+eq+'<div class="qopts">'+eopts+'</div>'+
     '<div class="prow"><button class="back" onclick="backMove()">&#8617; Move</button><span class="hint">Same ratio both sides &mdash; first try = SUPER!</span></div></div>';
 } else if(S.ui==="scale"){
   var tgt=[S.scaleBase[0]*S.scaleK,S.scaleBase[1]*S.scaleK];
   var done=(S.scaleCur[0]===tgt[0]&&S.scaleCur[1]===tgt[1]);
   var cur='<div class="ratio">'+chips(S.scaleCur,S.scaleCols)+'</div>';
   var facs='';[2,3,4,5].forEach(function(x){facs+='<button class="fac" onclick="scaleBy('+x+')">&times;'+x+'</button>';});facs+='<button class="fac" onclick="scaleReset()">&#8634;</button>';
   bottom='<div class="puz"><div class="ph"><span>'+MV.scale.name+'</span><span class="rt" id="rt">0:'+(S.rt<10?"0":"")+S.rt+'</span></div>'+
     '<div class="hint" style="margin-bottom:2px">'+(S.flavor||'')+' &nbsp; Grow <b style="color:#ffec3d">'+S.scaleBase[0]+' : '+S.scaleBase[1]+'</b> &rarr; first part must become <b style="color:#ffec3d">'+(S.scaleBase[0]*S.scaleK)+'</b> &nbsp;(<b style="color:#ffec3d">'+(S.scaleBase[0]*S.scaleK)+' : ?</b>)</div>'+cur+
     '<div class="facs">'+facs+'</div>'+
     '<div class="prow"><button class="back" onclick="backMove()">&#8617; Move</button><span class="hint">'+(done?'Reached! Firing...':'Work out the factor yourself &mdash; one correct tap = SUPER!')+'</span></div></div>';
 } else {
   var inner='';
   if(S.move==="simp2"||S.move==="simp3"){
     var facs='';[2,3,4,5,6,7,9].forEach(function(x){facs+='<button class="fac" onclick="divideBy('+x+')">&divide;'+x+'</button>';});
     inner='<div class="hint" style="margin-bottom:2px">'+(S.flavor||'')+'</div><div class="ratio">'+chips(S.terms,S.cols)+'</div><div class="facs">'+facs+'</div><div class="hint">Pick a COMMON factor, simplest in ONE step = SUPER!</div>';
   } else {
     var L=S.shareT;
     function cardG(idx){var c=(idx===1)?S.c1:S.c2;var nL=(idx===1)?S.ln[0]:S.ln[1],nR=(idx===1)?S.ln[1]:S.ln[2];var cL=(idx===1)?S.lc[0]:S.lc[1],cR=(idx===1)?S.lc[1]:S.lc[2];var shR=(idx===1),shL=(idx===2);
       var bval=(idx===1)?c[1]:c[0],done=(bval===L);var ctrl='';
       if(S.fstep!=="lcm"){ctrl=done?'<span class="okmark">&#10003;</span>':(S.fstep==="mult"?['2','3','4','5','6'].map(function(x){return '<button class="lb" onclick="multCardG('+idx+','+x+')">&times;'+x+'</button>';}).join(''):'');}
       return '<div class="lcard"><div class="lhdr">'+nL+' : '+nR+'</div><div style="display:flex;align-items:center;gap:5px">'+
         '<span class="chip'+(shL?' gsh':'')+'" style="background:'+cL+'">'+c[0]+'</span><span class="colon">:</span><span class="chip'+(shR?' gsh':'')+'" style="background:'+cR+'">'+c[1]+'</span></div><div class="lbtns">'+ctrl+'</div></div>';}
     var prompt;
     if(S.fstep==="lcm"){var fopts=S.lcmOpts.map(function(n){return '<button class="lb lcmopt" onclick="answerLCM('+n+')">'+n+'</button>';}).join('');
       prompt='<div class="lcmq">&#128279; LCM of <b style="color:'+S.lc[1]+'">'+S.c1b[1]+'</b> &amp; <b style="color:'+S.lc[1]+'">'+S.c2b[0]+'</b> &nbsp;=&nbsp; '+fopts+'</div>';
     } else if(S.fstep==="mult"){prompt='<div class="hint">&times;? &rarr; make each <b style="color:'+S.lc[1]+'">'+S.ln[1]+'</b> become <b style="color:#ffec3d">'+L+'</b></div>';
     } else {var copts=S.combineOpts.map(function(o){return '<button class="lb lcmopt" onclick="answerCombine(\''+o+'\')">'+o+'</button>';}).join('');
       prompt='<div class="lcmq">&#10024; '+S.ln[0]+' : '+S.ln[1]+' : '+S.ln[2]+' &nbsp;=&nbsp; '+copts+'</div>';}
     inner='<div class="hint" style="margin-bottom:2px">'+(S.flavor||'')+'</div>'+cardG(1)+cardG(2)+prompt;
   }
   bottom='<div class="puz"><div class="ph"><span>'+MV[S.move].name+'</span><span class="rt" id="rt">0:'+(S.rt<10?"0":"")+S.rt+'</span></div>'+inner+
     '<div class="prow"><button class="back" onclick="backMove()">&#8617; Move</button>'+((S.move==="fusion")?'':'<button class="atk" onclick="attack()">&#127812; ATTACK!</button>')+'</div></div>';
 }
 $('game').innerHTML='<div class="arena" style="background:'+worldBg()+'">'+bgDecor()+invBar()+'<div class="bigtimer'+(S.rt<=5?' danger':'')+'" id="bigtimer">'+Math.max(0,S.rt)+'</div>'+cageHTML+foeHTML+meHTML+'<div class="ground"></div></div><div class="panel">'+bottom+'</div>';
 $('foenum').textContent=(S.ei+1);$('coins').textContent=S.coins;
}

/* ---------- start / home ---------- */
function showStart(){
 $('overlay').classList.remove('hide');
 $('overlay').innerHTML='<div class="startcard"><div class="ttl">&#127812; Ratio Quest &mdash; Save the Princess!</div>'
  +'<div class="sub">King Koopa has captured the Princess in World 10. Cross 10 worlds, solve the ratios, beat the bosses!</div>'
  +'<div class="storyrow">'+monSVG(sBowser,'#2e7d3a','#1a4a22',74)+'<div class="say">&#128557; "Help! '+'" &mdash; cross 10 worlds and rescue me!</div>'+princess(64)+'</div>'
  +'<div class="mvlist">'
   +'<div class="mvc" style="background:#2f7eb5">Simplify Stomp<small>化簡 a : b</small></div>'
   +'<div class="mvc" style="background:#e0922f">Equal Kick<small>等值比缺項</small></div>'
   +'<div class="mvc" style="background:#3aa64a">Grow Blast<small>按倍數放大 (Lv.2)</small></div>'
   +'<div class="mvc" style="background:#8a5cd0">Triple Stomp<small>化簡 a:b:c (Lv.2)</small></div>'
   +'<div class="mvc" style="background:#c4281c">Fire Combo<small>連比 a:b:c (Lv.3)</small></div>'
   +'<div class="mvc" style="background:#2e9e5b">Mushroom Guard<small>答題回 ¼ HP</small></div>'
  +'</div>'
  +'<div class="namebox">Name your hero: <input id="heroIn" maxlength="12" placeholder="MARI" /></div>'
  +'<div class="roles">&#127919; Every foe is <b>weak to one skill</b> (&times;1.6) &mdash; shown above its head. Later foes <b>resist Simplify (&times;&frac12;)</b>, so you must grow into the deeper skills! &#11088; Solve in ONE smart step for a SUPER critical. &#128293; Keep a clean streak for COMBO. Beat a boss &rarr; it drops items into your bag (top-left).</div>'
  +'<button onclick="startGame()">Start Quest!</button></div>';
}
function goHome(){if(S.timer)clearInterval(S.timer);stopMusic();showStart();}
showStart();
</script>
